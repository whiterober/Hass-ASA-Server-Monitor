<body>

<script>































































// ============================================================































































// Preview panel toggle































































// ============================================================































































function togglePreview() {































































  var panel = document.getElementById('previewPanel');































































  var handle = document.getElementById('wsResizeHandle');































































  var btn = document.getElementById('btnCollapsePreview');































































  var floater = document.getElementById('floatRestore');































































  if (panel.style.display === 'none') {































































    panel.style.display = '';































































    if (handle) handle.style.display = '';































































    if (btn) btn.textContent = '◀';































































    if (floater) floater.style.display = 'none';































































    // Restore saved split































































    var saved = localStorage.getItem('asa-split-editor');































































    document.documentElement.style.setProperty('--split-editor', saved || '50%');































































  } else {































































    // Save current split































































    var w = document.getElementById('main')?.getBoundingClientRect().width;

      var isGrid = handle.parentElement.classList.contains('grid-2');































































      var container = handle.parentElement;































































      var containerWidth = container.getBoundingClientRect().width;

        var dx = ev.clientX - startX;

        } else {

          document.documentElement.style.setProperty(propName, newPx + '%');































































        }































































      }































































      function onUp() {































































        handle.classList.remove('active');

        }































































        if (finalVal) localStorage.setItem(storageKey, finalVal);































































      }































































      document.addEventListener('mousemove', onMove);

    });































































  });

      window._dragActive = true;
      document.querySelectorAll('.drag-target-glow').forEach(function(s) {
        s.classList.remove('drag-target-glow');
      });
    },
    onMove: function(evt) {
      // Glow the ghost element itself — it's exactly where the item will land
      var ghost = opts.container.querySelector('.drag-ghost');
      document.querySelectorAll('.drag-target-glow').forEach(function(s) {
        if (s !== ghost) s.classList.remove('drag-target-glow');
      });
      if (ghost && !ghost.classList.contains('drag-target-glow')) {
        ghost.classList.add('drag-target-glow');
      }
    },
    onEnd: function(evt) {
      // _dragActive consumed once by delegated click handler below
      document.querySelectorAll('.drag-target-glow').forEach(function(s) {
        s.classList.remove('drag-target-glow');
      });
      if (evt.oldIndex === evt.newIndex) return;
      var list = opts.getList();
      if (!list) return;
      var item = list.splice(evt.oldIndex, 1)[0];
      list.splice(evt.newIndex, 0, item);
      if (opts.onReorder) opts.onReorder();
    }
  };
  if (opts.filter) sortableOpts.filter = opts.filter;
  var sortable = new Sortable(opts.container, sortableOpts);
  return sortable;
}

// One-time delegated click on sub-section -> toggle expand/collapse
(function(){
  var main = document.getElementById('main');
  if (!main) return;
  main.addEventListener('click', function(e) {
    if (window._dragActive) { window._dragActive = false; return; }
    if (window._blockHandleDown) { window._blockHandleDown = false; return; }
    if (e.target.closest('.drag-handle, .drag-handle-block')) return;
    // Skip if click originated from any native toggle element or its parent
    if (e.target.closest('.block-indicator, .br-sec-arrow, [onclick*="toggleBRSection"], [onclick*="toggleBlockBody"]')) return;
    var sub = e.target.closest('.sub-section');
    if (!sub) return;
    var toggle = sub.querySelector('.block-indicator, .br-sec-arrow');
    if (!toggle) return;
    if (typeof toggleBlockBody === 'function' && toggle.classList.contains('block-indicator')) {
      toggleBlockBody(toggle);
    } else {
      toggle.click();
    }
  });
})();

// Suppress click after mousedown on block-handle (prevents section collapse on failed drag)

})();

function toggleBlockBody(el) {































































  const section = el.closest(".sub-section");































































  const body = section.querySelector('.block-body');































































  if (!body) return;































































  body.classList.toggle('collapsed');































































  // Update indicator































































  const indicator = section.querySelector('.block-indicator');































































  if (indicator) indicator.textContent = body.classList.contains('collapsed') ? '+' : '−';































































  // Populate preview































































  updateBlockPreview(section);































































}































































function updateBlockPreview(section) {































































  const body = section.querySelector('.block-body');































































  const preview = section.querySelector('.block-preview');































































  if (!preview) return;































































  if (body && body.classList.contains('collapsed')) {































































    // Priority: icon image → item name → text content → selects































































    const iconInputs = body.querySelectorAll('input[id*=Icon], input[id*=icon]');































































    for (const inp of iconInputs) { if (inp.value.trim()) {































































      const autoColor = body.querySelector('input[id*=AutoColor]');































































      const filter = (autoColor && autoColor.checked) ? 'var(--ic-icon-filter,none)' : 'none';































































      preview.innerHTML = '<img src=\"'+inp.value.trim()+'\" style=\"width:30px;height:30px;object-fit:contain;vertical-align:middle;border-radius:3px;filter:'+filter+'\">';































































      return;































































    } }































































    const mdiInputs = body.querySelectorAll('input[id*=Mdi], input[id*=mdi]');































































    for (const inp of mdiInputs) { if (inp.value.trim()) { preview.textContent = inp.value.trim(); return; } }































































    const nameInputs = body.querySelectorAll('input[id*=Nm], input[id*=Name], input[id*=Title], input[id*=title]');































































    for (const inp of nameInputs) { if (inp.value.trim()) { preview.textContent = inp.value.trim(); return; } }































































    const textareas = body.querySelectorAll('textarea');































































    for (const ta of textareas) { if (ta.value.trim()) { preview.textContent = ta.value.trim(); return; } }































































    const textInputs = body.querySelectorAll('input[type=text], input:not([type])');































































    for (const inp of textInputs) { if (inp.value.trim()) { preview.textContent = inp.value.trim(); return; } }































































    const selects = body.querySelectorAll('select');































































    for (const sel of selects) { if (sel.selectedIndex >= 0 && sel.options[sel.selectedIndex].text) { preview.textContent = sel.options[sel.selectedIndex].text; return; } }































































    preview.innerHTML = '';































































  } else {































































    preview.innerHTML = '';































































  }































































}































































function updateAllPreviews() {

function toggleColorPopup(el) {
  var targetId = el.getAttribute('data-target');

  var cur = sel ? sel.value : "#ccc";
  var existing = document.querySelector(".cat-color-popup.show");
  if (existing) { existing.classList.remove("show"); if (existing.dataset.dotId === el.id) return; }

  if (popup) popup.remove();
  popup = document.createElement("span"); popup.id = "catColorPopup"; popup.className = "cat-color-popup"; document.body.appendChild(popup);

  popup.classList.add("show");
}
function selectMarkerColor(dot, clr) {

    html += "<div class='icon-picker-header' style='border-bottom:none'><input id='iconPickerSearch' placeholder='搜索图标...' oninput='filterIconPicker()'><button class='btn-small btn-primary' onclick='refreshIconList()' title='从R2重新拉取'>🔄</button><button class='btn-small btn-danger' onclick='closeIconPickerOverlay(this)'>✕</button></div>";















    html += "<div style='display:flex;gap:4px;padding:0 12px 6px;overflow-x:auto;flex-shrink:0' id='iconPickerCats'>";















    catOrder.forEach(function(cat){















      html += "<span class='server-tab' data-cat='"+cat+"' onclick='filterIconPickerCat(this)'>"+(catLabels[cat]||cat)+" ("+cats[cat].length+")</span>";















    });















    html += "</div>";















    html += "<div class='icon-picker-grid' id='iconPickerGrid'>";















    list.forEach(function(item){















      var parts = item.url.split("ASA/")[1]?.split("/");















      var cat = (parts && parts.length > 1) ? parts[0] : "其他";















      var cbArgs = (ci !== undefined && ii !== undefined) ? ","+(ci||0)+","+(ii||0) : "";















      html += "<div class='icon-picker-item' data-url='"+item.url+"' data-cat='"+cat+"' onclick='selectDeviceIconFromEl(this,"+si+","+bi+","+ri+cbArgs+")' title='"+item.name+"'><img src='"+item.url+"' loading='lazy' onerror='this.hidden=true'><span>"+item.name+"</span></div>";















    });















    html += "</div></div>";















    overlay.innerHTML = html;















    document.body.appendChild(overlay);















  });















}















var iconPickerCat = "";















function filterIconPickerCat(el) {















  iconPickerCat = el.getAttribute("data-cat") || "";















  document.querySelectorAll("#iconPickerCats .server-tab").forEach(function(t){ t.classList.remove("active"); });















  el.classList.add("active");















  filterIconPicker();















}















function filterIconPicker() {















  var q = (document.getElementById("iconPickerSearch")?.value||"").toLowerCase();















  document.querySelectorAll(".icon-picker-item").forEach(function(el){















    var matchSearch = !q || el.textContent.toLowerCase().includes(q);















    var matchCat = !iconPickerCat || el.dataset.cat === iconPickerCat;















    el.style.display = (matchSearch && matchCat) ? "" : "none";















  });















}















function loadIconList(cb) {































































  if (iconListLoaded && iconList.length) { if (cb) cb(iconList); return; }































































  fetch('/local/asa-data/icons2.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){































































    iconList = data || []; iconListLoaded = true;































































    if (cb) cb(iconList);































































  }).catch(function(){































































    WS.toast('图标列表加载失败', 'error');































































  });































































}































































function closeIconPickerOverlay(el) { var o = el.closest('.icon-picker-overlay'); if (o) o.remove(); return o; }































































function selectDeviceIconFromEl(el, si, bi, ri, ci, ii) {































  var url = el.getAttribute("data-url") || "";































  if (!url) return;































  if (ci !== undefined && ii !== undefined) {































    selectItemIcon(url, si, bi, ri, ci, ii);































  } else {































    selectDeviceIcon(url, si, bi, ri);































  }































  setTimeout(function(){ closeIconPickerOverlay(el); }, 100);































}































function selectItemIcon(url, si, bi, ri, ci, ii) {































  var iconEl = document.getElementById("brItemIcon"+si+"_"+bi+"_"+ri+"_"+ci+"_"+ii);































  if (iconEl) { iconEl.value = url; }















  var nameEl = document.getElementById("brItemName"+si+"_"+bi+"_"+ri+"_"+ci+"_"+ii);















  if (nameEl) { nameEl.style.display = url ? "none" : ""; }















  // Replace + placeholder with img, or vice versa















  var parent = iconEl?.parentElement;















  if (parent) {















    var existingImg = parent.querySelector("img[onclick*='openIconPicker']");















    var existingSpan = parent.querySelector("span[onclick*='openIconPicker']");















    if (url) {















      if (existingSpan) existingSpan.style.display = "none";















      if (existingImg) { existingImg.src = url; existingImg.style.display = ""; }















      else {















        var newImg = document.createElement("img");















        newImg.src = url; newImg.style.cssText = "width:22px;height:22px;object-fit:contain;cursor:pointer;flex-shrink:0";















        newImg.onclick = function(e){ e.stopPropagation(); openIconPicker(si,bi,ri,ci,ii); };















        newImg.title = "点击换图标"; newImg.onerror = function(){ this.hidden = true; };















        if (existingSpan) existingSpan.after(newImg); else if (iconEl) iconEl.after(newImg);















      }















    } else {















      if (existingImg) existingImg.style.display = "none";















      if (existingSpan) existingSpan.style.display = "";















    }















  }































}































function selectDeviceIcon(url, si, bi, ri) {































































  var iconEl = document.getElementById('brSRIcon'+si+'_'+bi+'_'+ri);































































  if (iconEl) { iconEl.value = url; }































































  var row = iconEl?.closest('.sr-row');































































  if (row) {































































    var img = row.querySelector('.sr-row-header img');































































    if (img) { img.src = url; img.style.display = ''; }































































  }































































  setTimeout(showPreview, 200);































































}































































function refreshIconList() {































  WS.callService("shell_command", "list_r2_icons", {}).then(function(){































    setTimeout(function(){































      iconListLoaded = false; iconList = [];































      loadIconList(function(list){































        var overlay = document.querySelector(".icon-picker-overlay");































        if (overlay) {































          var si = parseInt(overlay.dataset.si) || 0;































          var bi = parseInt(overlay.dataset.bi) || 0;































          var ri = parseInt(overlay.dataset.ri) || 0;































          overlay.remove();































          iconPickerCat = "";































          openIconPicker(si, bi, ri);































        }































        WS.toast("已刷新 "+list.length+" 个图标", "success");































      });































    }, 2000);































  }, function(){ WS.toast("刷新失败", "error"); });































}































function renderR2Config() {































































  var html = '<div style=\"display:flex;flex-direction:column;min-height:100%\"><div class=\"card\"><h3>R2 存储桶配置</h3>';































































  html += '<div class=\"row\"><div class=\"form-group\"><label>Access Key</label><input id=\"r2AccessKey\" type=\"text\"></div>';

  html += '<div class=\"form-group\"><label>Endpoint</label><input id=\"r2Endpoint\"></div></div>';































































  html += '<div class=\"row\"><div class=\"form-group\"><label>前缀</label><input id=\"r2Prefix\"></div>';































































  html += '<div class=\"form-group\"><label>公开域名</label><input id=\"r2Base\"></div></div>';

  html += '<div class=\"card\" style=\"margin-top:12px\"><small>图标总数：<b id=\"r2IconCount\">...</b> | <button class=\"btn-small\" onclick=\"loadIconCount()\">加载</button></small></div>';

  document.getElementById('main').innerHTML = html;































































  // Load current config































































  fetch('/local/asa-data/r2_config.json?t='+Date.now()).then(function(r){return r.json()}).then(function(cfg){

    document.getElementById('r2SecretKey').value = cfg.secret_key || '';































































    document.getElementById('r2Bucket').value = cfg.bucket || '';































































    document.getElementById('r2Endpoint').value = cfg.endpoint || '';































































    document.getElementById('r2Prefix').value = cfg.prefix || '';































































    document.getElementById('r2Base').value = cfg.public_base || '';































































  }).catch(function(){});































































}































































function loadIconCount(){ loadIconList(function(l){ document.getElementById("r2IconCount").textContent = l.length; }); }































































function saveR2Config() {































































  var cfg = {































































    access_key: document.getElementById('r2AccessKey')?.value||'',































































    secret_key: document.getElementById('r2SecretKey')?.value||'',































































    bucket: document.getElementById('r2Bucket')?.value||'',
