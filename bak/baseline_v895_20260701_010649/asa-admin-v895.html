function closeIconPickerOverlay(el) { var o = el.closest('.icon-picker-overlay'); if (o) o.remove(); return o; }

function selectDeviceIconFromEl(el, si, bi, ri, ci, ii) {

  var url = el.getAttribute("data-url") || "";

  if (!url) return;

  if (ci !== undefined && ii !== undefined) {

    selectItemIcon(url, si, bi, ri, ci, ii);

  } else {

    selectDeviceIcon(url, si, bi, ri);

  }

  setTimeout(function(){ closeIconPickerOverlay(el); }, 100);

}

function selectItemIcon(url, si, bi, ri, ci, ii) {

  var iconEl = document.getElementById("brItemIcon"+si+"_"+bi+"_"+ri+"_"+ci+"_"+ii);

  if (iconEl) { iconEl.value = url; }

  var nameEl = document.getElementById("brItemName"+si+"_"+bi+"_"+ri+"_"+ci+"_"+ii);

  if (nameEl) { nameEl.style.display = url ? "none" : ""; }

  // Replace + placeholder with img, or vice versa

  var parent = iconEl?.parentElement;

  if (parent) {

    var existingImg = parent.querySelector("img[onclick*='openIconPicker']");

    var existingSpan = parent.querySelector("span[onclick*='openIconPicker']");

    if (url) {

      if (existingSpan) existingSpan.style.display = "none";

      if (existingImg) { existingImg.src = url; existingImg.style.display = ""; }

      else {

        var newImg = document.createElement("img");

        newImg.src = url; newImg.style.cssText = "width:28px;height:28px;object-fit:contain;cursor:pointer;flex-shrink:0";

        newImg.onclick = function(e){ e.stopPropagation(); openIconPicker(si,bi,ri,ci,ii); };

        newImg.title = "点击换图标"; newImg.onerror = function(){ this.hidden = true; };

        if (existingSpan) existingSpan.after(newImg); else if (iconEl) iconEl.after(newImg);

      }

    } else {

      if (existingImg) existingImg.style.display = "none";

      if (existingSpan) existingSpan.style.display = "";

    }

  }

}

function selectDeviceIcon(url, si, bi, ri) {

  console.log('[selectDeviceIcon] called', url.substring(0,30), si, bi, ri);

  var iconEl = document.getElementById('brSRIcon'+si+'_'+bi+'_'+ri);

  if (iconEl) { iconEl.value = url; }

  // Update data model so renderBaseRef preserves the icon

  try { var _srv = baseData.servers[brSelectedServer]; var _tab = (_srv.tabs||[])[brSelectedTab]; var _row = _tab.sections[si].content_blocks[bi].rows[ri]; if (_row) _row.device_icon_url = url; } catch(e) {}

  // Save expand state of sections, row bodies, and block bodies

  var expandedSections = [];

  document.querySelectorAll(".br-sec-body").forEach(function(b,i){ if(!b.classList.contains("collapsed")) expandedSections.push(i); });

  var expandedRows = [];

  document.querySelectorAll(".sr-row-body").forEach(function(rb,i){ if(rb.style.display==="block") expandedRows.push(i); });

  var expandedBlocks = [];

  document.querySelectorAll(".block-body").forEach(function(bb,i){ if(!bb.classList.contains("collapsed")) expandedBlocks.push(i); });

  renderBaseRef();

  setTimeout(function(){

    _restoreExpandState(expandedSections, expandedRows, expandedBlocks);

  }, 120);

  setTimeout(showPreview, 200);

}

function refreshIconList() {
  var btn = document.querySelector('button[onclick="refreshIconList()"]');
  var origHTML = btn ? btn.innerHTML : '';
  var origWidth = btn ? btn.style.width : '';

  // 按钮内嵌进度条
  function showProgress(pct, text) {
    if (!btn) return;
    btn.style.position = 'relative';
    btn.style.overflow = 'hidden';
    btn.style.width = origWidth || '220px';
    btn.innerHTML = '<span style="position:relative;z-index:1;font-size:0.85em">' + text + '</span>'
      + '<span style="position:absolute;left:0;top:0;bottom:0;width:' + pct + '%;background:var(--accent);opacity:0.15;transition:width .3s;z-index:0;border-radius:6px"></span>';
  }

  showProgress(0, '刷新中...');

  WS.callService("shell_command", "list_r2_icons", {}).then(function(){
    WS.callService("shell_command", "gen_icon_thumbs", {});
    // 轮询进度文件
    var pollTimer = setInterval(function(){
      fetch('/local/asa-data/thumbs_progress.json?t=' + Date.now())
        .then(function(r){ return r.json(); })
        .then(function(p){
          if (p.total > 0) {
            var pct = Math.round(p.done * 100 / p.total);
            var txt = pct + '% (' + p.done + '/' + p.total + ')';
            if (p.new) txt += ' +' + p.new + '新';
            showProgress(pct, txt);
          }
          if (p.status === 'done') {
            clearInterval(pollTimer);
            showProgress(100, '完成!');
            setTimeout(function(){
              if (btn) { btn.innerHTML = origHTML; btn.style.width = origWidth; }
            }, 1500);
            // 重新加载
            iconListLoaded = false; iconList = [];
            var old = document.querySelector('script[src*="icon_thumbs.js"]');
            if (old) old.remove();
            var s = document.createElement('script');
            s.src = '/local/asa-data/icon_thumbs.js?t=' + Date.now();
            document.head.appendChild(s);
            loadIconList(function(list){
              var cnt = document.getElementById("r2IconCount");
              if (cnt) cnt.textContent = list.length;
              WS.toast("已刷新 " + list.length + " 个图标", "success");
            });
          }
        }).catch(function(){});
    }, 600);
  }, function(){
    if (btn) { btn.innerHTML = origHTML; btn.style.width = origWidth; }
    WS.toast("刷新失败", "error");
  });
}

  html += '<button onclick="testR2Connection()" style="display:inline-flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.85em;white-space:nowrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;flex-shrink:0"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>测试连接</button>';
  html += '</span>';
  html += '<button onclick="refreshIconList()" style="display:inline-flex;align-items:center;background:var(--card);border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-size:0.85em;white-space:nowrap"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="margin-right:4px;flex-shrink:0"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>刷新图标列表 (<b id="r2IconCount">...</b>)</button>';
  html += '</div>';

  html += '</div></div>';

  document.getElementById('main').innerHTML = html;

  // Load current config

  fetch('/local/asa-data/r2_config.json?t='+Date.now()).then(function(r){return r.json()}).then(function(cfg){

    document.getElementById('r2AccessKey').value = cfg.access_key || '';

    document.getElementById('r2SecretKey').value = cfg.secret_key || '';

    document.getElementById('r2Bucket').value = cfg.bucket || '';

    document.getElementById('r2Base').value = cfg.public_base || '';

}

function loadIconCount(){ loadIconList(function(l){ document.getElementById("r2IconCount").textContent = l.length; }); }

function saveR2Config() {

  var cfg = {

    access_key: document.getElementById('r2AccessKey')?.value||'',

    secret_key: document.getElementById('r2SecretKey')?.value||'',

    bucket: document.getElementById('r2Bucket')?.value||'',

    endpoint: document.getElementById('r2Endpoint')?.value||'',

    prefix: document.getElementById('r2Prefix')?.value||'',

    public_base: document.getElementById('r2Base')?.value||''

  };

  var json = JSON.stringify(cfg);

  var b64 = btoa(unescape(encodeURIComponent(json)));

  WS.callService('shell_command', 'save_r2_config', {b64data: b64}).then(function(){

    WS.toast('配置已保存', 'success');

  }, function(){ WS.toast('保存失败', 'error'); });

}

function testR2Connection() {

  saveR2Config();

  WS.toast('正在测试连接...', 'success');

  setTimeout(function(){

    WS.callService('shell_command', 'list_r2_icons', {}).then(function(){

      setTimeout(function(){

        fetch('/local/asa-data/icons2.json?t='+Date.now()).then(function(r){return r.json()}).then(function(d){

          iconList = d; iconListLoaded = true;

          WS.toast('连接成功！'+d.length+' 个图标', 'success');

        });

      }, 2000);

    }, function(){ WS.toast('连接失败', 'error'); });

}

<script>

// add-block-panel: moved inside #mcBlocks for natural scroll flow
// save row: extracted to card level as flex-shrink:0 (matches 部落基地 layout)
(function(){
  var obs = new MutationObserver(function(){
    var panel = document.querySelector('.add-block-panel');
    var mc = document.getElementById('mcBlocks');
    if (panel && mc && panel.parentElement !== mc) {
      mc.appendChild(panel);
    }
    // Fix save row: group save+delete, preview on right (like 部落基地)
    var saveBtn = document.querySelector('button') && [...document.querySelectorAll('button')].find(function(b){ return b.textContent.includes('保存TAB'); });
    if (saveBtn) {
      var saveRow = saveBtn.parentElement;
      var card = saveBtn.closest('.card');
      var flex1Container = saveRow.closest('[style*="flex:1"]');
      if (card && flex1Container && flex1Container.parentElement === card) {
        // Grab all buttons in saveRow (save + delete)
        var delBtn = saveRow.querySelector('button') && [...saveRow.querySelectorAll('button')].find(function(b){ return b.textContent.includes('删除TAB'); });
        // Wrap save+delete in a group div
        var group = document.createElement('div');
        group.style.cssText = 'display:flex;align-items:center;gap:8px';
        saveRow.insertBefore(group, saveRow.firstChild);
        group.appendChild(saveBtn);
        if (delBtn) group.appendChild(delBtn);
        // Move preview button into save row
        var previewBtn = [...document.querySelectorAll('button')].find(function(b){ return b.textContent.includes('预览'); });
        if (previewBtn && flex1Container.contains(previewBtn)) {
          saveRow.appendChild(previewBtn);
        }
        saveRow.style.cssText = 'flex-shrink:0;padding-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:nowrap';
        card.appendChild(saveRow);
      }
    }
    // Remove empty save rows (leftover placeholders anywhere under .card, skip labels)
    document.querySelectorAll('.card div').forEach(function(d){
      if (d.tagName === 'LABEL') return;
      if (d.style.flexShrink === '0' && d.innerText.trim() === '' && !d.querySelector('button') && d.querySelectorAll('*').length === 0) d.remove();
    });
  });
  var main = document.getElementById('main');
  if (main) obs.observe(main, { childList: true, subtree: true });
})();

// Mobile: auto-collapse add-block-panel on scroll
(function(){
  if (window.innerWidth > 768) return;
  var timer;
  var scrollEl = document.getElementById('mcBlocks') || document;
  scrollEl.addEventListener('scroll', function(){
    clearTimeout(timer);
    timer = setTimeout(function(){
      var panel = document.querySelector('.add-block-panel.open');
      if (panel) {
        panel.classList.remove('open');
        var toggle = panel.previousElementSibling;
        if (toggle && toggle.classList.contains('add-block-toggle')) toggle.style.display = '';
      }
    }, 200);
  }, {passive: true});
})();

</script>
