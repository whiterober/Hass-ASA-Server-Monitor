<!DOCTYPE html>

<html lang="zh-CN" data-theme="dark">

<head>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASA 后台管理</title>

<style>

:root {

  --bg: #1a1a2e;

  --card: #16213e;

  --text: #e0e0e0;

  --accent: #4fc3f7;

  --danger: #ef5350;

  --success: #66bb6a;

  --border: #2a2a4a;

  --input-bg: #0f0f23;

  --primary-background-color: #1c1c1c;
  --primary-text-color: #e0e0e0;

}

[data-theme="light"] {

  --bg: #f0f0f5;

  --card: #ffffff;

  --text: #1a1a2e;

  --accent: #0288d1;

  --danger: #d32f2f;

  --success: #388e3c;

  --border: #d0d0d8;

  --primary-background-color: #fafafa;
  --primary-text-color: #1a1a2e;

  --input-bg: #ffffff;

}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body { height: 100%; overflow: hidden; }

body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

header { background: var(--card); padding: 12px 20px; display: flex; align-items: center; gap: 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }

header, header h1, header span, header button, header label { white-space: nowrap; }

header h1 { font-size: 1.2em; color: var(--accent); }

.status { font-size: 0.8em; padding: 4px 10px; border-radius: 12px; }

.status.on { background: var(--success); color: var(--bg); }

.status.off { background: var(--danger); color: #fff; }

nav { display: flex; gap: 4px; padding: 8px; background: var(--card); border-bottom: 1px solid var(--border); flex-shrink: 0; }

nav button { padding: 8px; border: none; background: transparent; color: var(--text); cursor: pointer; border-radius: 6px; font-size: 0.9em; white-space: nowrap; }

button[data-panel="r2-config"] { margin-left: auto; }

nav button.active { background: var(--accent); color: var(--bg); }

main { max-width: none; }

.panel { display: none; }

.panel.active { display: block; }

.card { background: var(--card); border-radius: 8px; padding: 16px; margin-bottom: 6px; border: 1px solid var(--border); }

.card h3 { margin-bottom: 12px; color: var(--accent); font-size: 1em; }

label { display: block; font-size: 0.85em; color: var(--text); opacity: 0.65; margin-bottom: 4px; }

input, textarea, select { width: 100%; padding: 8px 12px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 0.9em; margin-bottom: 8px; }

.editor-panel input, .editor-panel textarea, .editor-panel select { padding-left: 10px; padding-right: 10px; }

textarea { min-height: 60px; resize: vertical; font-family: monospace; font-size: 0.8em; }

button { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; }

.btn-primary { background: var(--accent); color: #000; font-weight: bold; height:24px;line-height:24px;padding-top:0;padding-bottom:0;box-sizing:border-box; }

.btn-danger { background: transparent !important; color: var(--danger) !important; border: none !important; }

.btn-small {display:inline-flex;align-items:center; padding: 4px 10px; font-size: 0.8em; }

.btn-success { background: var(--success); color: #000; white-space: nowrap; }
.btn-danger { white-space: nowrap; }

#btnTogglePreview { white-space: nowrap; }

.row { display: flex; gap: 12px; flex-wrap: wrap; }

.row > * { flex: 1; min-width: 200px; }

.grid-2 { display: grid; grid-template-columns: var(--split-left, 250px) 1fr; gap: 0; position: relative; }

@media (max-width: 768px) {

  .grid-2 { grid-template-columns: 1fr !important; }

  .grid-2 > * { min-width: 0 !important; }

  .grid-2 > .tab-sidebar, .grid-2 > .resize-handle { display: none !important; }

  .mobile-tab-icon { display: inline-flex !important; align-items: center; justify-content: center; width: 28px; height: 28px; padding: 2px; border: 1px solid var(--border); border-radius: 4px; background: var(--card); color: var(--accent); cursor: pointer; flex-shrink: 0; }

  .mobile-tab-icon:hover { background: var(--accent); color: #fff; }

  header { padding: 8px 12px; gap: 8px; }

  header h1 { font-size: 1em; }

  header span, header button, header label { font-size: 0.75em; }

  nav button { padding: 6px 10px; font-size: 0.75em; }

  .server-tabs { flex-wrap: nowrap !important; overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 0 -8px 0 -8px !important; scrollbar-width: none; -ms-overflow-style: none; }
.server-tabs::before, .server-tabs::after { content: ''; min-width: 4px; flex-shrink: 0; }
  .server-tabs::-webkit-scrollbar { display: none; }

  .server-tab { flex-shrink: 0; }

  .card { background: transparent !important; border: none !important; padding: 8px !important; margin-bottom: 0 !important; border-radius: 0 !important; width: 100% !important; }

  .grid-2 { background: var(--card); width: 100% !important; min-height: 100%; }

  .workspace { align-items: stretch; }

  #main.editor-panel { padding: 0 !important; overflow-y: visible !important; }

  .r2-config-grid { grid-template-columns: 1fr !important; }

  .mobile-only { display: flex !important; }
  .mobile-only button { white-space: nowrap; }

  /* 移动端：保存TAB 居中，预览移至左侧 */
  #main [style*="space-between"] { justify-content: center !important; gap: 8px; }
  #btnTogglePreview { order: -1; }
}

.mobile-tab-icon { display: none; }

.mobile-only { display: none; }
.mobile-tab-popup { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 99999; justify-content: center; align-items: flex-start; padding-top: 15vh; }

.mobile-tab-popup.show { display: flex; }

.mobile-tab-popup-inner { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; max-width: 280px; width: 90%; max-height: 60vh; overflow-y: auto; }

.mobile-tab-popup-inner .item-entry { display: block !important; padding: 8px 12px; cursor: pointer; border-radius: 4px; margin: 2px 0; white-space: nowrap; }

.mobile-tab-popup-inner .item-entry.active { background: var(--accent); }
[data-theme="dark"] .mobile-tab-popup-inner .item-entry.active { color: #000; }
[data-theme="light"] .mobile-tab-popup-inner .item-entry.active { color: #fff; }

.mobile-tab-popup-inner .item-entry:hover:not(.active) { background: var(--input-bg); }

.grid-2 > .resize-handle { position: absolute; top: 0; bottom: 0; left: var(--split-left, 250px); width: 6px; margin-left: -3px; z-index: 10; cursor: col-resize; background: transparent; transition: background 0.15s; }

.grid-2 > .resize-handle:hover, .grid-2 > .resize-handle.active { background: var(--accent); }

.grid-2 > *:not(.resize-handle) { padding: 0; }

.grid-2 > *:first-child { padding-right: 6px; }

.grid-2 > *:last-child { padding-left: 12px; }

.item-list { max-height: 60vh; overflow-y: auto; }

.item-entry { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; margin-bottom: 6px; cursor: pointer; transition: background .2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.item-entry:hover { background: rgba(255,255,255,0.05); }

.item-entry.active { border-color: var(--accent); background: rgba(79,195,247,0.1); }

.form-group { margin-bottom: 8px; min-width: 0; }

.sub-section { border: 1px solid var(--border); border-radius: 6px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
.sub-section .block-body { cursor: default; }

.toast { position: fixed; bottom: 20px; right: 20px; padding: 12px 20px; border-radius: 8px; color: #fff; z-index: 999; animation: fadeIn .3s; }

.toast.success { background: var(--success); }

.toast.error { background: var(--danger); }

.toast.warning { background: #f59e0b; }

@media (max-width: 768px) { .toast { bottom: 80px; right: 10px; left: 10px; text-align: center; font-size: 0.85em; padding: 8px 12px; } }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.loading { text-align: center; padding: 40px; color: var(--text); opacity: 0.4; }

.inline-label { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }

.inline-label input { margin-bottom: 0; }

.server-tabs { display: flex; gap: 4px; flex-wrap: wrap; padding: 0; margin: 0; }

.server-tab { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border); cursor: pointer; font-size: 0.85em; background: var(--input-bg); color: var(--text); }

.server-tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

.icon-cat-tab { width: 80px; min-width: 80px; text-align: center; white-space: nowrap; position: relative; overflow: visible !important; padding-bottom: 16px !important; display: flex; justify-content: center; }
.cat-count-badge { position: absolute; bottom: 2px; right: 4px; font-size: 0.6em; opacity: 0.5; line-height: 1; }

.icon-preview { width: 40px; height: 40px; border-radius: 4px; object-fit: contain; background: var(--input-bg); }

/* Side-by-side layout */

.workspace { display: flex; gap: 0; flex: 1; min-height: 0; overflow: hidden; }

.editor-panel { width: var(--split-editor, 50%); flex: 0 0 auto; flex-shrink: 0; overflow-y: auto; padding: 16px; min-width: 0; display: flex; flex-direction: column; }

.preview-panel { flex: 1; background: var(--bg); border-left: 2px solid var(--border); display: flex; flex-direction: column; }

.workspace > .resize-handle { width: 6px; cursor: col-resize; background: transparent; transition: background 0.15s; flex-shrink: 0; }

.workspace > .resize-handle:hover, .workspace > .resize-handle.active { background: var(--accent); }

.preview-header { padding: 10px 16px; background: var(--card); display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }

.preview-header h3 { color: var(--accent); font-size: 0.95em; }

.preview-frame { flex: 1; border: none; background: var(--bg); width: 100%; min-height: 0; }

.preview-empty { flex: 1; display: flex; align-items: center; justify-content: center; color: var(--text); opacity: 0.5; font-size: 0.9em; }

/* SortableJS drag ghost */

.drag-ghost { opacity: 0.4 !important; }

.drag-chosen { opacity: 0.6; }

.drag-dragging { cursor: grabbing !important; }

/* Drag target inset border — drop indicator while dragging */

.drag-target-glow {

  box-shadow: inset 0 0 0 3px var(--accent);

  z-index: 1;

  position: relative;

}

/* Item-level glow — outline with breathing room + rounded corners */

.drag-target-glow-item {

  outline: 1px solid var(--accent);

  outline-offset: 2px;

  border-radius: 4px;

  z-index: 1;

  position: relative;

}

/* Drag handle — narrow grip zone, floated left */

.drag-handle {

  display: inline-block;

  vertical-align: middle;

  cursor: grab;

  opacity: 0.3;

  user-select: none;

  margin-right: 3px;

  font-size: 0.85em;

  line-height: 1.2;

  transition: opacity 0.15s;

}

.drag-handle:hover, .drag-handle-block:hover { opacity: 0.7; }

.drag-handle-block {

  display: inline-block;

  vertical-align: middle;

  cursor: grab;

  opacity: 0.3;

  user-select: none;

  margin-right: 3px;

  font-size: 0.85em;

  line-height: 1.2;

  transition: opacity 0.15s;

}

.drag-handle-cat {

  display: inline-block;

  vertical-align: middle;

  cursor: grab;

  opacity: 0.3;

  user-select: none;

  margin-right: 3px;

  font-size: 0.85em;

  line-height: 1.2;

  transition: opacity 0.15s;

}

.drag-handle-cat:hover { opacity: 0.7; }

.drag-handle-item {

  display: inline-block;

  vertical-align: middle;

  cursor: grab;

  opacity: 0.3;

  user-select: none;

  margin-right: 3px;

  font-size: 0.85em;

  line-height: 1.2;

  transition: opacity 0.15s;

}

.drag-handle-item:hover { opacity: 0.7; }

.block-body.collapsed { display: none; }

.sr-cats-body.collapsed { display: none; }

.block-preview { user-select: none; min-width: 0; }

.block-indicator:hover { background: var(--accent) !important; color: #000; }
.badge[data-mc-type]:hover { filter: brightness(1.2); cursor: pointer; }

/* 自动反色：深色原图 dark 主题反色 */
img.ic-auto-dark, .ic-auto-dark img { filter: none; }
[data-theme="dark"] img.ic-auto-dark, [data-theme="dark"] .ic-auto-dark img { filter: invert(1); }
/* 自动反色：浅色原图 light 主题反色 */
img.ic-auto-light, .ic-auto-light img { filter: none; }
[data-theme="light"] img.ic-auto-light, [data-theme="light"] .ic-auto-light img { filter: invert(1); }
/* 旧版兼容 */
img.ic-auto-color { filter: none; }
:root { --ic-icon-filter: none; }
[data-theme="light"] { --ic-icon-filter: invert(1); }

/* 反色角标：小圆点 */
.ic-mode-normal::after,
.ic-mode-reverse::after,
.ic-mode-failed::after {
  content: '';
  position: absolute;
  top: -1px; right: -1px;
  width: 4px; height: 4px;
  border-radius: 50%;
}
.ic-mode-normal::after { background: var(--accent); }
.ic-mode-reverse::after { background: var(--warning, orange); }
.ic-mode-failed::after { background: #ef4444; }

/* Icon Picker */

.icon-picker-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; align-items: center; justify-content: center; }

.icon-picker-panel { background: var(--card); border-radius: 8px; width: 90%; max-width: 700px; max-height: 80vh; display: flex; flex-direction: column; overflow: hidden; }

.icon-picker-header { display: flex; gap: 8px; padding: 12px; align-items: center; flex-shrink: 0; }

.icon-picker-header input { flex: 1; margin: 0; padding: 8px 12px; }

.icon-picker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 6px; padding: 12px; overflow-y: auto; flex: 1; }

.icon-picker-item { display: flex; flex-direction: column; align-items: center; padding: 6px; border: 2px solid transparent; border-radius: 6px; cursor: pointer; transition: border .15s; }

.icon-picker-item:hover { border-color: var(--border); }

.icon-picker-item.selected { border-color: var(--accent); background: rgba(79,195,247,0.1); }

.icon-picker-item img{width:48px;height:48px;object-fit:contain}
.icon-thumb-wrap{position:relative;display:inline-block;line-height:0}
.ac-dot{position:absolute;top:2px;right:2px;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:1}
.ac-dot.ac-light{background:#fff;border:1px solid #333}
.ac-dot.ac-dark{background:#333;border:1px solid #fff}
.icon-picker-img { background: var(--border); border-radius: 3px; }
.icon-picker-img.loaded { background: transparent; }

.icon-picker-item span { font-size: 0.6em; text-align: center; margin-top: 2px; word-break: break-all; line-height: 1.2; max-width: 100%; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

.sr-action-popover input[type=checkbox] { display: none; }

.sr-items { display: flex; flex-wrap: wrap; gap: 4px; align-items: flex-start; }

.count-badge {

  display: inline-block;

  background: rgba(128,128,128,0.12);

  color: var(--text);

  font-size: 0.7em;

  padding: 2px 5px;

  border-radius: 3px;

  margin-left: 6px;

  vertical-align: middle;

  line-height: 1.2;

  min-width: 22px;

  text-align: center;

}

.sr-cat-card { display: flex; flex-wrap: wrap; align-items: center; gap: 4px; background:rgba(128,128,128,0.05); cursor: default; flex: 1 1 auto; box-sizing: border-box; }
.sr-cat-card[style*="dashed"] { width: auto !important; max-width: none !important; flex: 0 0 auto !important; }

.sr-cat-card input[type=checkbox] { width: auto; }

.sr-cat-card select { width: auto; }

.sr-cat-card > div:first-child { flex: 1 1 auto; min-width: 0; flex-wrap: nowrap; position: relative; padding-right: 22px; }

.sr-cat-card label { width: auto; flex: 0 0 auto; }

.cat-merged { display: flex; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.cat-merged > .cat-input-wrap { flex: 1; min-width: 0; }

.cat-input-wrap { position: relative; display: inline-flex; align-items: center; background:var(--input-bg); }

.cat-input-wrap:last-child { border-left: 1px solid var(--border); }

.cat-input-wrap { position: relative; }

.cat-input-wrap input[type=text], .cat-input-wrap input:not([type]) { border: none !important; border-radius: 0 !important; margin: 0 !important; padding: 4px 8px; font-size: 0.75em; outline: none !important; box-shadow: none !important; height: 26px; box-sizing: border-box; width: 100%; }
.cat-input-wrap input[id^=mcICDescText] { min-width: 150px; flex: 1; }

.cat-input-wrap input[type=number] { border: none !important; border-radius: 0 !important; margin: 0 !important; padding: 2px 4px; font-size: 0.75em; outline: none !important; box-shadow: none !important; height: 26px; box-sizing: border-box; width: 100%; text-align: center; }

.cat-input-wrap:first-child { }

.cat-input-wrap:last-child { }

.cat-input-wrap:first-child input[type=text], .cat-input-wrap:first-child input:not([type]) { }

.cat-input-wrap:last-child input[type=text], .cat-input-wrap:last-child input:not([type]) { font-size: 0.7em; }

/* Floating popup for bold + color */

.cat-bc-popup {

  display: none;

  position: fixed;

  margin-top: 2px;

  background: var(--card);

  border: 1px solid var(--border);

  border-radius: 6px;

  padding: 5px 8px;

  z-index: 99999;

  box-shadow: 0 4px 16px rgba(0,0,0,0.55);

  gap: 6px;

  align-items: center;

  white-space: nowrap;

  color: var(--text);

}

.cat-bc-popup.show { display: flex; }

.cat-bc-popup label { font-size: 0.65em; margin: 0; display: flex; align-items: center; gap: 2px; cursor: pointer; color: var(--text); opacity: 0.7; user-select: none; }

.cat-bc-popup label:has(input:checked) { color: var(--accent); font-weight: bold; opacity: 1; }

.cat-bc-popup label input[type=checkbox] { width: 12px; height: 12px; margin: 0; cursor: pointer; }

.cat-bc-popup input[type=color] { width: 20px !important; height: 20px !important; padding: 0 !important; border: 1px solid var(--border) !important; border-radius: 3px !important; cursor: pointer !important; background: transparent; }

.cat-col-bq { display:inline-flex;align-items:center;border:1px solid var(--border);border-radius:6px;overflow:hidden;height:26px;font-size:0.65em;flex-shrink:0;user-select:none;background:var(--input-bg,transparent); }

.cat-col-bq .cat-col-seg { padding:1px 6px;cursor:pointer;color:var(--text);opacity:.45;white-space:nowrap;line-height:24px;transition:opacity .15s,background .15s,color .15s; }

.cat-col-bq .cat-col-seg:hover { opacity:.75; }

.cat-col-bq .cat-col-seg.active { opacity:1;background:var(--accent);color:#000; }

[data-theme="dark"] .cat-col-bq .cat-col-seg.active { color:var(--bg); }

[data-theme="light"] .cat-col-bq .cat-col-seg.active { color:#fff; }

.cat-col-bq .cat-col-divider { width:1px;background:var(--border);flex-shrink:0;align-self:stretch; }

.cat-col-bq:has(.cat-bq-seg.active) .cat-col-divider { background:transparent; }

.cat-col-bq .cat-col-seg.cat-bq-seg { padding:1px 8px; }

.cat-color-wrap { padding:4px 3px 4px 7px;margin-left:0px;margin-right:0px;flex-shrink:0;display:flex;align-items:center;transition:background .15s;align-self:stretch; }

.cat-col-bq:not(:has(.cat-bq-seg.active)) .cat-color-wrap { background:transparent; }

.cat-col-bq:has(.cat-bq-seg.active) .cat-color-wrap { background:var(--accent); }

.sr-cat-card > div > label:empty, .sr-cat-card > div > label:has(+ .cat-col-bq) { display:none !important; }

.cat-bold-btn { font-size:0.55em;cursor:pointer;color:var(--text);opacity:.4;user-select:none;margin-left:6px;margin-right:4px;line-height:1;transition:opacity .15s,color .15s; }

.cat-bold-btn:hover { opacity:.7; }

label:has([id^=brCatBold]), label:has([id^=brCatSubLabelBold]) { display:none !important; }

.cat-bold-btn.active { opacity:1 !important;color:var(--accent) !important;font-weight:bold !important; }

.cat-color-dot { width:8px;height:8px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1px solid rgba(0,0,0,0.3);background-clip:padding-box !important; }
.cat-color-dot.auto-theme { outline:1px solid rgba(0,0,0,0.3); outline-offset:-1px; }

/* Shared popup base */
.asa-popup { display:none;position:fixed;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:6px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.45);gap:4px;align-items:center; }
.asa-popup.show { display:flex; }

.cat-color-popup { }

.cat-color-popup.show { display:flex; }
.cat-color-opt.auto-theme { outline:1px solid rgba(0,0,0,0.3); outline-offset:-1px; }

.cat-color-opt { width:16px;height:16px;border-radius:50%;cursor:pointer;flex-shrink:0;transition:border-color .15s; }

.cat-color-opt:hover { border-color:var(--text); }

.cat-color-opt.active { border-color:var(--accent);box-shadow:0 0 0 1px var(--accent); }

.cat-opacity-dot { display:inline-block;width:8px;height:8px;margin:0 6px;vertical-align:middle;flex-shrink:0;cursor:pointer;user-select:none;border-radius:0;border:1px solid rgba(255,255,255,0.4);transition:opacity .15s; }
.cat-opacity-dot:hover { opacity:0.75; }

.cat-opacity-popup { }
.cat-opacity-popup.show { display:flex; }
.cat-opacity-opt { padding:2px 8px;font-size:0.7em;cursor:pointer;color:var(--text);border-radius:4px;white-space:nowrap;user-select:none;transition:background .15s,color .15s; }
.cat-opacity-opt:hover { background:var(--accent);color:var(--bg); }
.cat-opacity-opt.active { background:var(--accent);color:var(--bg);font-weight:bold; }

// ============================================================

// Preview panel toggle

// ============================================================

function togglePreview() {

  var panel = document.getElementById('previewPanel');

  var handle = document.getElementById('wsResizeHandle');

  var btn = document.getElementById('btnCollapsePreview');

  var floater = document.getElementById('floatRestore');

  if (panel.style.display === 'none') {

    panel.style.display = '';

    if (handle) handle.style.display = '';

    if (btn) btn.textContent = '◀';

    if (floater) floater.style.display = 'none';

    var tpBtn = document.getElementById('btnTogglePreview');

    if (tpBtn) tpBtn.textContent = '折叠预览';

    // Restore saved split

    var saved = localStorage.getItem('asa-split-editor');

    document.documentElement.style.setProperty('--split-editor', saved || '50%');

  } else {

    // Save current split

    var w = document.getElementById('main')?.getBoundingClientRect().width;

    var cw = document.querySelector('.workspace')?.getBoundingClientRect().width || 1;

    localStorage.setItem('asa-split-editor', (w/cw*100)+'%');

    panel.style.display = 'none';

    if (handle) handle.style.display = 'none';

    if (btn) btn.textContent = '+';

    if (floater) floater.style.display = 'block';

    var tpBtn2 = document.getElementById('btnTogglePreview');

    if (tpBtn2) tpBtn2.textContent = '展开预览';

    document.documentElement.style.setProperty('--split-editor', '100%');

  }

}

// ============================================================

// Resize handles — drag to resize panels

// ============================================================

function initResizeHandles() {

  // Restore saved sizes

  var savedLeft = localStorage.getItem('asa-split-left');

  var savedEditor = localStorage.getItem('asa-split-editor');

  if (savedLeft) document.documentElement.style.setProperty('--split-left', savedLeft);

  var previewPanel = document.getElementById('previewPanel');
  if (savedEditor && !(previewPanel && previewPanel.style.display === 'none')) document.documentElement.style.setProperty('--split-editor', savedEditor);

  // Insert handles into .grid-2 containers

  document.querySelectorAll('.grid-2').forEach(function(grid) {

    if (grid.querySelector('.resize-handle')) return;

    var handle = document.createElement('div');

    handle.className = 'resize-handle';

    grid.appendChild(handle);

  });

  // Attach drag behavior to all resize handles

  document.querySelectorAll('.resize-handle').forEach(function(handle) {

    if (handle.dataset.resized) return;

    handle.dataset.resized = '1';

    handle.addEventListener('mousedown', function(e) {
  e.preventDefault();
  handle.classList.add('active');
  document.body.style.userSelect = 'none';
  document.body.style.cursor = 'col-resize';
  // Disable iframe pointer events to prevent drag interruption
  var iframe = document.querySelector('#previewPanel iframe');
  if (iframe) iframe.style.pointerEvents = 'none';
  var startX = e.clientX;
  var isGrid = handle.parentElement.classList.contains('grid-2');
  var container = handle.parentElement;
  var containerWidth = container.getBoundingClientRect().width;
  var currentVal, propName, storageKey;
  if (isGrid) {
    propName = '--split-left';
    storageKey = 'asa-split-left';
    var raw = getComputedStyle(document.documentElement).getPropertyValue('--split-left').trim();
    currentVal = parseFloat(raw) || 250;
  } else {
    propName = '--split-editor';
    storageKey = 'asa-split-editor';
    var rawPct = getComputedStyle(document.documentElement).getPropertyValue('--split-editor').trim();
    currentVal = (parseFloat(rawPct) || 50);
  }

  function onMove(ev) {
    var dx = ev.clientX - startX;
    var newPx = currentVal + (isGrid ? dx : dx / containerWidth * 100);
    if (isGrid) {
      newPx = Math.max(150, Math.min(newPx, containerWidth - 300));
      document.documentElement.style.setProperty(propName, newPx + 'px');
    } else {
      newPx = Math.max(20, Math.min(newPx, 80));
      document.documentElement.style.setProperty(propName, newPx + '%');
    }
  }

  function onUp() {
    handle.classList.remove('active');
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
    var iframe = document.querySelector('#previewPanel iframe');
    if (iframe) iframe.style.pointerEvents = '';
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    var finalVal = getComputedStyle(document.documentElement).getPropertyValue(propName).trim();
    localStorage.setItem(storageKey, finalVal);
  }

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
});

  });

}

  var x = new XMLHttpRequest();
  x.open('POST', '/api/services/shell_command/save_data_chunk', false);
  x.setRequestHeader('Content-Type', 'application/json');
  x.setRequestHeader('Authorization', 'Bearer ' + WS._token);
  try { x.send(JSON.stringify({filename:'_pending.json',b64data:b64})); } catch(e) {}
}

// ============================================================

// Auto Color: Canvas brightness detection + theme-aware filter

// ============================================================

var _pendingBrightnessChecks = 0;
var _failedItems = [];

function detectImageBrightness(imgUrl, callback, retries) {
  if (retries === undefined) retries = 2;
  if (!imgUrl) { callback(-1); return; }
  // Use fetch with CORS for cross-origin images (bypass img tag caching issues)
  fetch(imgUrl, {mode: 'cors', cache: 'no-store'}).then(function(resp) {
    if (!resp.ok) { callback(-1); return; }
    return resp.blob();
  }).then(function(blob) {
    if (!blob) return;
    var url = URL.createObjectURL(blob);
    var img = new Image();
    img.onload = function() {
      try {
        var canvas = document.createElement('canvas');
        canvas.width = canvas.height = 20;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, 20, 20);
        var data = ctx.getImageData(0, 0, 20, 20).data;
        var lum = 0, n = 0;
        for (var i = 0; i < data.length; i += 4) {
          if (data[i+3] < 128) continue;
          var r = data[i]/255, g = data[i+1]/255, b = data[i+2]/255;
          lum += 0.2126*r + 0.7152*g + 0.0722*b;
          n++;
        }
        URL.revokeObjectURL(url);
        callback(n ? lum/n : -1);
      } catch(e) {
        URL.revokeObjectURL(url);
        callback(-1);
      }
    };
    img.onerror = function() { URL.revokeObjectURL(url); callback(-1); };
    img.src = url;
  }).catch(function(e) {
    if (retries > 0) {
      setTimeout(function() { detectImageBrightness(imgUrl, callback, retries - 1); }, 1000);
      return;
    }
    callback(-1, e.message || '网络错误');
  });
}

}

function _showSaveResult(buildOK) {
  var container = document.getElementById('toastContainer');
  var failed = _failedItems.length;
  var pending = _pendingBrightnessChecks;

  function show(msg, type) {
    if (!container) return;
    var d = document.createElement('div');
    d.className = 'toast ' + type;
    d.innerHTML = msg;
    container.appendChild(d);
    setTimeout(function() { if (d.parentNode) d.parentNode.removeChild(d); }, 5000);
  }

  if (pending > 0) {
    show('\u274C \u8FD8\u6709 ' + pending + ' \u9879\u4EAE\u5EA6\u68C0\u6D4B\u672A\u5B8C\u6210\uFF0C\u8BF7\u7A0D\u5019\u518D\u4FDD\u5B58', 'error');
  } else if (failed > 0) {
    var lines = _failedItems.map(function(item) {
      return item.serverName + ' \u00B7 ' + (item.di != null ? '\u63CF\u8FF0\u884C #' + item.di : '\u677F\u5757\u56FE\u6807') + '\uFF08' + item.reason + '\uFF09';
    });
    show('\u26A0\uFE0F \u5DF2\u4FDD\u5B58 \u2014 ' + failed + ' \u9879\u4EAE\u5EA6\u68C0\u6D4B\u5931\u8D25<br>' + lines.join('<br>'), 'warning');
  } else if (buildOK === true) {
    show('\u2705 \u5DF2\u4FDD\u5B58\u5E76\u6784\u5EFA\u6210\u529F', 'success');
  } else if (buildOK === false) {
    show('\u26A0\uFE0F \u5DF2\u4FDD\u5B58\uFF0C\u6784\u5EFA\u5931\u8D25', 'error');
  } else {
    show('\u2705 \u5DF2\u4FDD\u5B58', 'success');
  }
  _failedItems = [];
}

// Poll _bl_step.txt for build result: returns true if SAVED_OK, false otherwise
async function _waitBuildResult() {
  var maxTries = 30;
  var delay = 500;
  for (var i = 0; i < maxTries; i++) {
    await new Promise(function(r) { setTimeout(r, delay); });
    try {
      var resp = await fetch('/local/asa-data/_bl_step.txt?' + Date.now());
      if (!resp.ok) continue;
      var txt = await resp.text();
      if (!txt.trim()) continue;
      var lines = txt.trim().split('\n');
      var last = lines[lines.length - 1].trim();
      if (last.indexOf('SAVED_OK') >= 0) return true;
      if (last.indexOf('ERR_') >= 0) return false;
    } catch(e) {
      // fetch failed, retry
    }
  }
  return false; // timeout
}

// ============================================================

const DATA_PATH = '/local/asa-data';

async function loadJSON(filename) {

  try {

    const resp = await fetch(`${DATA_PATH}/${filename}?t=${Date.now()}`, {credentials: 'same-origin', cache: 'no-store'});

    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);

    return await resp.json();

  } catch(e) {

    console.error(`Load ${filename}:`, e);

    return null;

  }

}

async function saveJSON(filename, data, skipPending) {

  const json = JSON.stringify(data, null, 2);

  const bytes = new TextEncoder().encode(json);

  // Build base64 in binary chunks to avoid charcode overflow
  const CHUNK = 8192;
  let b64Parts = [];
  for (let i = 0; i < bytes.length; i += CHUNK) {
    const slice = bytes.subarray(i, i + CHUNK);
    let bin = '';
    for (let j = 0; j < slice.length; j++) bin += String.fromCharCode(slice[j]);
    b64Parts.push(btoa(bin));
  }

  try {
    // Guard: reject if WebSocket not connected (prevents silent failure)
    if (!WS.connected) {
      WS.toast('保存失败：未连接到 Home Assistant，请刷新页面后重试', 'error');
      return;
    }
    // Clear file first (empty data = delete)
    await WS.callService('shell_command', 'save_data_chunk', {
      filename: filename,
      b64data: ''
    });

    // Upload each base64 part as a standalone chunk
    // Each part is independently valid base64 (encoded from a binary slice)
    for (let i = 0; i < b64Parts.length; i++) {
      await WS.callService('shell_command', 'save_data_chunk', {
        filename: filename,
        b64data: b64Parts[i]
      });
    }

    await WS.callService('shell_command', 'render_asa', {
      filename: filename
    });

    await WS.callService('shell_command', 'build_lovelace', {});

    // Poll _bl_step.txt for build result
    var buildOK = await _waitBuildResult();
    _showSaveResult(buildOK);

    if (!skipPending && buildOK) incPending();

  } catch(e) {

    WS.toast(`保存失败: ${e.message}`, 'error');

  }

}

// SortableJS drag wrapper

function dragRegister(opts) {

  var glowClass = opts.glowClass || 'drag-target-glow';

  var sortableOpts = {

    draggable: opts.itemSelector,

    handle: opts.handle || '.drag-handle',

    group: opts.group || null,

    ghostClass: 'drag-ghost',

    chosenClass: 'drag-chosen',

    dragClass: 'drag-dragging',

    forceFallback: opts.forceFallback || false,

    scroll: true,

    scrollSensitivity: 60,

    scrollSpeed: 8,

    onStart: function(evt) {

      window._dragActive = true;

      document.querySelectorAll('.'+glowClass).forEach(function(s) {

        s.classList.remove(glowClass);

      });

    },

    onMove: function(evt) {

      // Glow the ghost element itself — it's exactly where the item will land

      var ghost = opts.container.querySelector('.drag-ghost');

      document.querySelectorAll('.'+glowClass).forEach(function(s) {

        if (s !== ghost) s.classList.remove(glowClass);

      });

      if (ghost && !ghost.classList.contains(glowClass)) {

        ghost.classList.add(glowClass);

      }

    },

    onEnd: function(evt) {

      // _dragActive consumed once by delegated click handler below

      document.querySelectorAll('.'+glowClass).forEach(function(s) {

        s.classList.remove(glowClass);

      });

      if (evt.oldIndex === evt.newIndex) return;

      var list = opts.getList();

      if (!list) return;

      var item = list.splice(evt.oldIndex, 1)[0];

      list.splice(evt.newIndex, 0, item);

      // Sync rebuild — SortableJS may leave spans moved but inputs stale
      if (opts.onReorder) opts.onReorder();

    }

  };

  if (opts.filter) sortableOpts.filter = opts.filter;

  var sortable = new Sortable(opts.container, sortableOpts);

  return sortable;

}

// One-time delegated click on sub-section -> toggle expand/collapse

(function(){

  var main = document.getElementById('main');

  if (!main) return;

  main.addEventListener('click', function(e) {

    if (window._dragActive) { window._dragActive = false; return; }

    if (window._blockHandleDown) { window._blockHandleDown = false; return; }

    if (e.target.closest('.drag-handle, .drag-handle-block, .drag-handle-cat, .drag-handle-item')) return;

    // Skip if click originated from any native toggle element or its parent

    if (e.target.closest('.br-sec-arrow, [onclick*="toggleBRSection"], [onclick*="toggleBlockBody"]')) return;

    if (e.target.closest('input, select, textarea, button, label, [onclick*="clearIconSelection"], [onclick*="toggleICMap"]')) return;

    if (e.target.closest('.block-body')) return;

    var sub = e.target.closest('.sub-section');

    if (!sub) return;

    var toggle = sub.querySelector('.badge[data-mc-type], .br-sec-arrow');

    if (toggle) {

      if (typeof toggleBlockBody === 'function' && toggle.classList.contains('badge')) {

        toggleBlockBody(toggle);

      } else {

        toggle.click();

      }

    } else {

      var body = sub.querySelector('.block-body');

      if (body) {
        if (body.classList.contains('collapsed')) {
          var container = sub.parentElement;
          var allBodies = container.querySelectorAll('.block-body');
          allBodies.forEach(function(b) { b.classList.add('collapsed'); });
        }
        body.classList.toggle('collapsed');
      }

    }

  });

})();

})();

function toggleBlockBody(el) {
  const section = el.closest(".sub-section");
  const body = section.querySelector('.block-body');
  if (!body) return;
  // Accordion: if unfolding, collapse all other blocks in same container
  var isCollapsed = body.classList.contains('collapsed');
  if (isCollapsed) {
    var container = section.parentElement;
    var allBodies = container.querySelectorAll('.block-body');
    allBodies.forEach(function(b) { b.classList.add('collapsed'); });
  }
  body.classList.toggle('collapsed');
  // Update badge indicator
  var badge = section.querySelector('.badge[data-mc-type]');
  if (badge) {
    var type = badge.getAttribute('data-mc-type') || '';
    badge.textContent = type;
  }

  // Populate preview

  updateBlockPreview(section);

}

function updateBlockPreview(section) {

  const body = section.querySelector('.block-body');

  const preview = section.querySelector('.block-preview');

  if (!preview) return;

  if (body && body.classList.contains('collapsed')) {

    // Priority: icon image → item name → text content → selects

    const iconInputs = body.querySelectorAll('input[id*=Icon], input[id*=icon]');

    for (const inp of iconInputs) { if (inp.value.trim()) {

      const autoColor = body.querySelector('input[id*=AutoColor]');
      const lumInput = body.querySelector('input[id*=IconLum]');
      const lumVal = lumInput ? parseFloat(lumInput.value) : null;
      var acCls = '';
      if (autoColor && autoColor.checked) {
        if (lumVal != null && !isNaN(lumVal) && lumVal !== 0.5) {
          acCls = lumVal > 0.5 ? ' ic-auto-light' : ' ic-auto-dark';
        } else {
          acCls = ' ic-auto-color';
        }
      }
      preview.innerHTML = '<img src=\"'+inp.value.trim()+'\" class=\"'+acCls+'\" style=\"width:30px;height:30px;object-fit:contain;vertical-align:middle;border-radius:3px\">';

      return;

    } }

    const mdiInputs = body.querySelectorAll('input[id*=Mdi], input[id*=mdi]');

    for (const inp of mdiInputs) { if (inp.value.trim()) { preview.textContent = inp.value.trim(); return; } }

    const nameInputs = body.querySelectorAll('input[id*=Nm], input[id*=Name], input[id*=Title], input[id*=title]');

    for (const inp of nameInputs) { if (inp.value.trim()) { preview.textContent = inp.value.trim(); return; } }

    const textareas = body.querySelectorAll('textarea');

    for (const ta of textareas) { if (ta.value.trim()) { preview.textContent = ta.value.trim(); return; } }

    const textInputs = body.querySelectorAll('input[type=text], input:not([type])');

    for (const inp of textInputs) { if (inp.value.trim()) { preview.textContent = inp.value.trim(); return; } }

    for (const sel of selects) { if (sel.selectedIndex >= 0 && sel.options[sel.selectedIndex].text) { preview.textContent = sel.options[sel.selectedIndex].text; return; } }

function removeICDesc(el, bi) {

  if (!confirm(DEL)) return;

  var card = el.closest('.sr-cat-card');

  // Remove from editorData by index (preserves images[] etc.)
  var tab = editorData.tabs[editorSelectedTab];
  var block = tab && tab.content_blocks ? tab.content_blocks[bi] : null;
  if (block && block.descriptions && card) {
    var container = document.getElementById('mcICDescs'+bi);
    if (container) {
      var idx = Array.prototype.indexOf.call(container.children, card);
      if (idx >= 0 && idx < block.descriptions.length) {
        block.descriptions.splice(idx, 1);
      }
    }
  }

  if (card) card.remove();

  // Re-index remaining DOM elements to prevent ID collisions
  if (container) {
    var cards = container.querySelectorAll('.sr-cat-card');
    cards.forEach(function(c, newDi) {
      var re = new RegExp(bi+'_(\\d+)', 'g');
      var diRe = new RegExp('\\bdi:(\\d+)', 'g');
      c.querySelectorAll('[id]').forEach(function(el) {
        el.id = el.id.replace(re, bi+'_'+newDi);
        var dt = el.getAttribute('data-target');
        if (dt) el.setAttribute('data-target', dt.replace(re, bi+'_'+newDi));
      });
      c.querySelectorAll('[onclick]').forEach(function(el) {
        var oc = el.getAttribute('onclick');
        if (oc) {
          oc = oc.replace(re, bi+'_'+newDi);
          oc = oc.replace(new RegExp(bi+',(\\d+)', 'g'), bi+','+newDi);
          oc = oc.replace(diRe, 'di:'+newDi);
          el.setAttribute('onclick', oc);
          try { el.onclick = new Function('event', oc); } catch(e) {}
        }
      });
    });
  }

  // Update ED desc count if applicable
  var c = document.getElementById('mcEDDescs'+bi);
  if (c) { var cnt = document.getElementById('mcEDDescCount'+bi); if (cnt) cnt.textContent = c.children.length; }

}

        for (var ci = 0; ci < icContainer.children.length; ci++) {
          var child = icContainer.children[ci];
          var textInput = child.querySelector('input[id^="mcICDescText'+bi+'_"]');
          var igContainer = child.querySelector('[id^="mcIGIcons'+bi+'_"]');
          if (igContainer) {
            // Read icons from visual span order (SortableJS moves spans, not hidden inputs).
            // Mirror tribe base: save reads DOM visual order.
            var igContainerId = igContainer.id;
            var igDiMatch = igContainerId.match(/^mcIGIcons\d+_(\d+)$/);
            var igDi = igDiMatch ? parseInt(igDiMatch[1]) : 0;
            var igIcons = [];
            var spans = igContainer.querySelectorAll(':scope > .ig-item');
            // Build lookup from old descriptions by icon index (ii: in onclick) — robust against URL format changes
            var oldIcons = (_oldDescs && _oldDescs[igDi] && _oldDescs[igDi].icons) ? _oldDescs[igDi].icons : [];
            spans.forEach(function(span) {
              var img = span.querySelector('img');
              // Extract icon index from onclick: openIconPicker({mode:'icon_group',bi:1,ii:N,di:...})
              var iiMatch = (span.getAttribute('onclick') || (img ? img.getAttribute('onclick') : '')).match(/ii:(\d+)/);
              var ii = iiMatch ? parseInt(iiMatch[1]) : -1;
              // Read original URL from hidden input (not img.src which is a thumbnail)
              var hiddenInput = document.getElementById('mcIGImg'+bi+'_'+igDi+'_'+ii);
              var imgUrl = (hiddenInput && hiddenInput.value) ? hiddenInput.value : (img ? img.src : '');
              if (!imgUrl) return;
              var oldMeta = (ii >= 0 && oldIcons && oldIcons[ii]) ? oldIcons[ii] : {};
              igIcons.push({
                image_url: imgUrl,
                quantity: parseInt(document.getElementById('mcIGQty'+bi+'_'+igDi+'_'+ii)?.value) || 0,
                image_auto_color_mode: oldMeta.image_auto_color_mode || 'off',
                image_native_luminance: oldMeta.image_native_luminance != null ? oldMeta.image_native_luminance : null
              });
            });
            // Block mode auto-reverse: same as description row (L3486-3490)
            var igSrvStates = {};
            try { igSrvStates = JSON.parse(document.getElementById('mcICDescSrvStates'+bi+'_'+igDi)?.value || '{}'); } catch(e) {}
            var hasBlock = false;
            for (var k in igSrvStates) { if (igSrvStates[k] === 2) { hasBlock = true; break; } }
            if (hasBlock) {
              igIcons.forEach(function(icon){
                if (icon.image_auto_color_mode === 'normal') icon.image_auto_color_mode = 'reverse';
              });
            }
            var igTitle = document.getElementById('mcIGTitle'+bi+'_'+igDi)?.value || '';
            b.descriptions.push({type:'icon_group', title: igTitle, icons: igIcons, server: document.getElementById('mcICDescServer'+bi+'_'+igDi)?.value || '', server_states: igSrvStates});
          } else if (child.querySelector('input[id^="mcCKLabel'+bi+'_"]')) {
            var ckLabel = child.querySelector('input[id^="mcCKLabel'+bi+'_"]');
            var ckIdMatch = ckLabel.id.match(/^mcCKLabel\d+_(\d+)$/);
            var ckDi = ckIdMatch ? parseInt(ckIdMatch[1]) : 0;
            b.descriptions.push({
              type:'copy_key',
              label: ckLabel.value || '',
              value: document.getElementById('mcCKValue'+bi+'_'+ckDi)?.value || ''
            });
          } else if (!textInput) {
            if (child.hasAttribute('data-fold-line')) {
              b.descriptions.push({type:'fold'});
            } else {
              b.descriptions.push({type:'br'});
            }
          } else {
            var idMatch = textInput.id.match(/^mcICDescText\d+_(\d+)$/);
            var origDi = idMatch ? parseInt(idMatch[1]) : 0;
            b.descriptions.push({
              text: textInput.value || '',
              bold: document.getElementById('mcICDescBold'+bi+'_'+origDi)?.checked || false,
              color: document.getElementById('mcICDescColor'+bi+'_'+origDi)?.value || 'auto',
              opacity: parseFloat(document.getElementById('mcICDescOpacity'+bi+'_'+origDi)?.value) || 1.0,
              server: document.getElementById('mcICDescServer'+bi+'_'+origDi)?.value || '',
              server_states: (function(){
                var raw = document.getElementById('mcICDescSrvStates'+bi+'_'+origDi)?.value || '{}';
                var st = JSON.parse(raw);
                // If server_states is empty, force server to empty too (prevent stale value)
                var srvEl = document.getElementById('mcICDescServer'+bi+'_'+origDi);
                if (srvEl && Object.keys(st).length === 0) srvEl.value = '';
                return st;
              })(),
              images: [{
                image_url: document.getElementById('mcICDescImg'+bi+'_'+origDi)?.value || '',
                quantity: parseInt(document.getElementById('mcICDescQty'+bi+'_'+origDi)?.value) || 0,
                image_auto_color_mode: (function(){
                  var mode = 'off';
                  if (_oldDescs && _oldDescs[origDi]) {
                    mode = (_oldDescs[origDi].images && _oldDescs[origDi].images[0]) ? (_oldDescs[origDi].images[0].image_auto_color_mode || 'off') : 'off';
                  }
                  if (mode === 'normal') {
                    var descSrv = document.getElementById('mcICDescServer'+bi+'_'+origDi)?.value || '';
                    if (descSrv) mode = 'reverse';
                  }
                  return mode;
                })(),
                image_native_luminance: (function(){
                  var descImg = document.getElementById('mcICDescText'+bi+'_'+origDi)?.closest('.sr-cat-card')?.querySelector('img[onclick*="openIconPicker("]');
                  if (descImg && descImg.parentElement) {
                    var lumVal = descImg.parentElement.getAttribute('data-lum');
                    if (lumVal && lumVal !== '0.500') return parseFloat(lumVal);
                  }
                  if (_oldDescs && _oldDescs[origDi]) {
                      var edLum = (_oldDescs[origDi].images && _oldDescs[origDi].images[0]) ? _oldDescs[origDi].images[0].image_native_luminance : null;
                      if (edLum != null) return edLum;
                  }
                  return null;
                })()
              }]
            });
          }
        }
      }
      if (!b.descriptions.length) b.descriptions = [{text: '', bold: false, color: ''}];

      var acMode = 'off';
      var acCheckbox = document.getElementById('mcICAutoColor'+bi);
      if (acCheckbox?.checked) acMode = 'normal';
      var modeBtn = document.getElementById('mcICColorModeBtn'+bi);
      if (modeBtn) {
        var m = modeBtn.getAttribute('data-mode') || 'off';
        if (m !== 'off') acMode = m;
      }
      // Convert flat icon fields to images[] array
      var _icUrl = document.getElementById('mcICIcon'+bi)?.value || '';
      var _prevLum = (b.images && b.images[0]) ? b.images[0].image_native_luminance : null;
      b.images = [{
        image_url: _icUrl,
        quantity: 0,
        image_auto_color_mode: acMode,
        image_native_luminance: (_prevLum != null && _prevLum !== 0.5) ? _prevLum : null
      }];
      b.icon_url = _icUrl;
    } else if (bt === 'expandable_detail') {

      if (!b.output) b.output = {};

      b.output.icon_url = document.getElementById('mcEDIcon'+bi)?.value || '';

      if (!b.spot) b.spot = {};

      b.spot.text = document.getElementById('mcEDSpot'+bi)?.value || '';

      if (!b.map) b.map = {};

      b.map.text = document.getElementById('mcEDMap'+bi)?.value || '';

      b.map.highlight = document.getElementById('mcEDHL'+bi)?.value || '';

      // Output descriptions

      if (!b.output) b.output = {};

      var edDs = b.output.descriptions || [];

      var edCnt = (document.getElementById('mcEDDescs'+bi)?.children.length) || 0;

      if (!edDs.length && edCnt === 0) edDs = [{text: '', bold: false, color: ''}];

      b.output.descriptions = [];

      for (var edi = 0; edi < edCnt; edi++) {

        b.output.descriptions.push({

          text: (document.getElementById('mcEDDescText'+bi+'_'+edi)?.value) || '',

          bold: document.getElementById('mcEDDescBold'+bi+'_'+edi)?.checked || false,

          opacity: parseFloat(document.getElementById('mcEDDescOpacity'+bi+'_'+edi)?.value) || 1.0

        });

      }

      // Flow blocks

      const fblks = (b.flow||{}).blocks || [];

      fblks.forEach((fb,fi) => {

        fb.type = document.getElementById('mcEDFT'+bi+'_'+fi)?.value || 'ol';

        if (fb.type === 'ol') {

          fb.steps = (document.getElementById('mcEDFSt'+bi+'_'+fi)?.value || '').split('\\n').filter(s=>s.trim());

        } else {

          fb.text = document.getElementById('mcEDFTxt'+bi+'_'+fi)?.value || '';

          fb.bold = document.getElementById('mcEDFBold'+bi+'_'+fi)?.checked || false;

          fb.color = (document.getElementById('mcEDFColor'+bi+'_'+fi)?.value) || '';

        }

      });

    }

  });

}

function renderFarmingTable(tab) {

  let h = '<div class="card"><h4>采集流程表 - 列头</h4>';

  (tab.rows||[]).forEach((row,ri) => {

    h += `<div class="sub-section"><strong>行${ri+1}:</strong>`;

      const data = row[key];

      if (data === undefined || data === null) return;

      if (key === 'output') {

        h += `<div class="form-group"><label>产出图标URL</label><input id="ftRow${ri}_output" value="${esc((data.icon_url||''))}"></div>`;

        h += `<div class="row"><div class="form-group"><label>${key}文本</label><input id="ftRow${ri}_${key}_text" value="${esc(d.text||'')}"></div><div class="form-group"><label>rowspan</label><input id="ftRow${ri}_${key}_rs" value="${d.rowspan||''}" type="number" style="width:60px"></div><div class="form-group"><label>高亮</label><input id="ftRow${ri}_${key}_hl" value="${esc(d.highlight||'')}" style="width:80px"></div></div>`;

function renderFarmingTablePreview(tab) {

  const cols = tab.columns || [];

  const rows = tab.rows || [];

  let h = '<div class="flex flex-col"><div class="borderr relative overflow-auto border border-gray-300"><table class="table-fixed border-collapse w-full min-w-max"><thead class="sticky top-0 z-20"><tr>';

  for (const col of cols) h += `<th class="border border-gray-300 p-2 text-center whitespace-nowrap">${esc(col)}</th>`;

  h += '</tr></thead><tbody>';

  let mapRem = 0, spotRem = 0;

  for (const row of rows) {

    h += '<tr>';

    // Map cell

    const map = row.map;

    if (map !== undefined && map !== null && typeof map === 'object' && Object.keys(map).length) {

      const hl = map.highlight || '';

      const noBadge = hl === 'neutral' || hl === 'col-neutral';

      const classes = ['border','border-gray-300','p-2','text-center','align-top','col-map'];

      if (noBadge) classes.push('col-neutral');

      let attrs = ` class="${classes.join(' ')}"`;

      if (map.rowspan) { attrs += ` rowspan="${map.rowspan}"`; mapRem = map.rowspan - 1; }

      if (hl && !noBadge) attrs += ` data-map="${hl}"`;

      h += `<td${attrs}>`;

      if (hl && !noBadge) {

        const iconMap = {Isl:'mdi:island',Cen:'mdi:earth',Sco:'mdi:fire',Abe:'mdi:mushroom',Ext:'mdi:city'};

        const icon = iconMap[hl] || 'mdi:server';

        h += `<div class="map-badge"><ha-icon icon="${icon}"></ha-icon><div>${esc(map.text||'')}</div></div>`;

      } else {

        h += esc(map.text||'');

      }

      h += '</td>';

    } else if (mapRem > 0) {

      mapRem--;

    }

    // Spot cell

    const spot = row.spot;

    if (spot !== undefined && spot !== null && typeof spot === 'object' && Object.keys(spot).length) {

      const hl = spot.highlight || '';

      const classes = ['border','border-gray-300','p-2','text-left','align-top','col-spot'];

      if (hl === 'neutral' || hl === 'col-neutral') classes.push('neutral');

      let attrs = ` class="${classes.join(' ')}"`;

      if (spot.rowspan) { attrs += ` rowspan="${spot.rowspan}"`; spotRem = spot.rowspan - 1; }

      if (hl && hl !== 'neutral' && hl !== 'col-neutral') attrs += ` data-map="${hl}"`;

      h += `<td${attrs}>${esc(spot.text||'')}</td>`;

    } else if (spotRem > 0) {

      spotRem--;

    }

    // Output cell

    const out = row.output || {};

    h += '<td class="border border-gray-300 p-2 align-top col-output">';

    if (out.icon_url) h += `<img src="${esc(out.icon_url)}" alt=""/>`;

    h += '</td>';

    // Flow cell

    const flow = row.flow || {};

    const blocks = flow.blocks || [];

    h += '<td class="border border-gray-300 p-2 text-left align-top col-flow">';

    if (blocks.length === 1 && blocks[0].type === 'text') {

      h += esc(blocks[0].text);

    } else if (blocks.length) {

      h += '<label class="clamp-wrap"><input type="checkbox" class="clamp-toggle"/><div class="clamp-content">';

      for (const b of blocks) {

        if (b.type === 'text') h += esc(b.text);

        else if (b.type === 'ol') {

          h += '<ol>';

          for (const s of (b.steps||[])) {

            if (typeof s === 'object' && s.html) h += `<li>${s.html}</li>`;

            else h += `<li>${esc(String(s))}</li>`;

          }

          h += '</ol>';

        } else if (b.type === 'md_hl') h += `<span class="${b.class||'md-hl'}">${b.text||''}</span>`;

        else if (b.type === 'strong') h += `<strong>${b.text||''}</strong>`;

      }

      h += '</div><span class="clamp-btn"></span></label>';

    }

    h += '</td></tr>';

  }

  h += '</tbody></table></div></div>';

  return h;

}

  const cfg = EDITOR_CONFIGS[editorMode];
  const tab = currentTab();

  // Wait for pending brightness checks to complete (max 5s)
  var _waitStart = Date.now();
  while (_pendingBrightnessChecks > 0 && Date.now() - _waitStart < 5000) {
    await new Promise(function(r) { setTimeout(r, 50); });
  }

  // Read tab name/desc from DOM using idPrefix
  if (cfg.idPrefix) {
    tab.name = document.getElementById(cfg.idPrefix + 'Name')?.value || tab.name;
    tab.description = document.getElementById(cfg.idPrefix + 'Desc')?.value || '';
  }

  saveMCBlocks(tab);

  await saveJSON(cfg.file, editorData);
  reRender();
  setTimeout(showPreview, 500);
}

function migrateMdiIconsOnce(tabs) {
  if (localStorage.getItem('_mdi_migrated_v1172')) return;
  var migrated = 0;
  for (var ti = 0; ti < tabs.length; ti++) {
    var tab = tabs[ti];
    for (var si = 0; si < (tab.sections||[]).length; si++) {
      var section = tab.sections[si];
      for (var bi = 0; bi < (section.blocks||[]).length; bi++) {
        var block = section.blocks[bi];
        if (block.type === 'info_card' && block.mdi_icon) {
          var mi = block.mdi_icon;
          if (mi.indexOf('mdi:') === 0) {
            if (!(block.title||'').indexOf('mdi:') === 0) {
              block.title = mi + ' ' + (block.title||'');
            }
          } else {
            block.title = mi + ' ' + (block.title||'');
          }
          delete block.mdi_icon;
          migrated++;
        }
      }
    }
  }
  if (migrated > 0) {
    localStorage.setItem('_mdi_migrated_v1172', '1');
      }
}

function selectDescServer(bi, di, sid) {
  // Backward compat: keep old hidden field in sync
  var hid = document.getElementById('mcICDescServer'+bi+'_'+di);
  // 3-state toggle via server_states — SINGLE-SELECT (only one map active at a time)
  var statesEl = document.getElementById('mcICDescSrvStates'+bi+'_'+di);
  var curStates = {};
  try { curStates = JSON.parse(statesEl?.value || '{}'); } catch(e) {}
  if (sid) {
    // Read previous state BEFORE clearing
    var prevSt = curStates[sid] || 0;
    // Clear ALL other maps first (single-select)
    curStates = {};
    // Cycle: 0→1→2→0 (for non-_default), 0→1→2→1 (for _default, never back to 0)
    var isFixed = sid && sid.charAt(0) === '_';
    var isDefault = sid === '_default';
    var st = (prevSt + 1) % 3;
    if (isDefault && st === 0) st = 1;  // _default loops 0→1→2→1, never empty
    if (st > 0) {
      curStates[sid] = st;
      if (!isFixed && hid) hid.value = sid;
    } else {
      // Non-_default cleared: revert to _default linear
      curStates = {'_default': 1};
      if (!isFixed && hid) hid.value = '';
    }
    // Auto-set color to server theme color (or reset to default when cleared)
    if (st > 0) {
      var s = SERVER_MAP[sid] || FIXED_STYLES[sid];
      if (s && s.c !== 'auto') {
        var colorInput = document.getElementById('mcICDescColor'+bi+'_'+di);
        if (colorInput) colorInput.value = s.c;
        var dot = document.getElementById('mcICDescCDot'+bi+'_'+di);
        if (dot) { dot.style.background = s.c; dot.classList.remove('auto-theme'); }
      }
    } else {
      // Reset color to default (auto)
      var colorInput = document.getElementById('mcICDescColor'+bi+'_'+di);
      if (colorInput) colorInput.value = 'auto';
      var dot = document.getElementById('mcICDescCDot'+bi+'_'+di);
      if (dot) { dot.style.background = 'linear-gradient(to right, #000 50%, #fff 50%)'; dot.classList.add('auto-theme'); }
    }
  } else {
    curStates = {};
    if (hid) hid.value = '';
    // Reset color to default (auto)
    var colorInput = document.getElementById('mcICDescColor'+bi+'_'+di);
    if (colorInput) colorInput.value = 'auto';
    var dot = document.getElementById('mcICDescCDot'+bi+'_'+di);
    if (dot) { dot.style.background = 'linear-gradient(to right, #000 50%, #fff 50%)'; dot.classList.add('auto-theme'); }
  }
  if (statesEl) statesEl.value = JSON.stringify(curStates);
  // Update badge: show map icon with state-appropriate styling
  updateDescSrvBadge(bi, di, curStates);
}

function selectMarkerColor(dot, clr) {

  } else {
    dot.style.background = clr;

function _initMobileTabSelect() {

  var sidebar = document.querySelector('.grid-2 > *:first-child');

  if (!sidebar) return;

  sidebar.classList.add('tab-sidebar');

  // Collect item-entries (TAB list) from sidebar only — NOT server-tabs
  var items = sidebar.querySelectorAll('.item-entry');

  // Remove old popup (always, so we don't leave stale popup from previous server)
  var oldPop = document.querySelector('.mobile-tab-popup');
  if (oldPop) oldPop.remove();

  // Find the SVG icon button (in brTabName row)
  var iconBtn = document.getElementById('mobileTabIcon');

  if (!iconBtn) return;

  // Floating popup (always create, even with 0 items, so +TAB button is available)
  var popup = document.createElement('div');
  popup.className = 'mobile-tab-popup';

  var inner = document.createElement('div');
  inner.className = 'mobile-tab-popup-inner';

  items.forEach(function(item, i){
    var div = document.createElement('div');
    div.className = 'item-entry' + (item.classList.contains('active') ? ' active' : '');
    div.textContent = item.textContent.trim();
    div.onclick = function(){
      item.click(); popup.classList.remove('show');
    };
    inner.appendChild(div);
  });

  // Append action buttons matching the current panel (same as desktop)
  (function(){
    var activeNav = document.querySelector('nav button.active');
    var panel = activeNav ? activeNav.getAttribute('data-panel') : '';
    var addFn = 'addTab()';
    var btnAdd = document.createElement('button');
    btnAdd.className = 'btn-primary';
    btnAdd.style.cssText = 'display:block;width:100%;margin-top:6px;padding:6px 0;height:auto;line-height:1.5;font-size:0.8em';
    btnAdd.textContent = '+ TAB';
    btnAdd.onclick = function(){ popup.classList.remove('show'); setTimeout(function(){ eval(addFn); }, 100); };
    inner.appendChild(btnAdd);
    if (panel === 'base-ref') {
      var btnCopy = document.createElement('button');
      btnCopy.className = 'btn-small';
      btnCopy.style.cssText = 'display:block;width:100%;margin-top:4px;padding:6px 0;border:1px solid var(--border);background:transparent;color:var(--text);opacity:0.75';
      btnCopy.textContent = '复制自...';
      btnCopy.onclick = function(){ popup.classList.remove('show'); setTimeout(function(){ copyBRFrom(); }, 100); };
      inner.appendChild(btnCopy);
    }
  })();

  popup.appendChild(inner);

  popup.onclick = function(e){ if (e.target === popup) popup.classList.remove('show'); };

  iconBtn.onclick = function(e){ e.preventDefault(); var wasShown = popup.classList.contains('show'); closeAllPopups(); if (!wasShown) popup.classList.add('show'); };

  document.body.appendChild(popup);

  // Mobile: hide preview + force full width

  if (window.innerWidth <= 768) {

    var tpBtn = document.getElementById('btnTogglePreview');

    if (tpBtn) tpBtn.textContent = '跳转预览';

    if (typeof togglePreview === 'function') {

      var panel = document.getElementById('previewPanel');

      if (panel && panel.style.display !== 'none') togglePreview();

    }

    setTimeout(function(){

      var grid = document.querySelector('.grid-2');

      if (grid) { grid.style.width = '100%'; grid.style.maxWidth = '100%'; }

      var main = document.getElementById('main');

      if (main) { main.style.width = '100%'; main.style.maxWidth = '100%'; main.style.flex = '1'; }

    }, 100);

  }

}

function loadIconList(cb) {

  if (iconListLoaded && iconList.length) { if (cb) cb(iconList); return; }

  var loaded = 0, need = 2;
  function done() { loaded++; if (loaded >= need && cb) cb(iconList); }

  fetch('/local/asa-data/icons2.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    iconList = data || []; iconListLoaded = true;
    done();
  }).catch(function(){
    iconList = []; iconListLoaded = true;
    WS.toast('图标列表加载失败', 'error');
    done();
  });

  // Load Chinese name map
  if (!iconZhMapLoaded) {
    fetch('/local/asa-data/icon_zh_map.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
      iconZhMap = data || {}; iconZhMapLoaded = true;
    }).catch(function(){
      iconZhMap = {}; iconZhMapLoaded = true;
    }).finally(done);
  } else { done(); }
}

var RECENT_KEY = 'asa-recent-icons', RECENT_MAX = 20;
function addRecentIcon(el) {
  var url = el.getAttribute('data-url') || '';
  var nameEl = el.querySelector('span');
  var name = nameEl ? nameEl.textContent : '';
  var cat = el.getAttribute('data-cat') || '';
  if (!url) return;
  var recent = [];
  try { recent = JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch(e) {}
  recent = recent.filter(function(r) { return r.url !== url; });
  recent.unshift({url: url, name: name, cat: cat});
  if (recent.length > RECENT_MAX) recent.length = RECENT_MAX;
  localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
}

}

function loadIconList(cb) {

  if (iconListLoaded && iconList.length) { if (cb) cb(iconList); return; }

  var loaded = 0, need = 2;
  function done() { loaded++; if (loaded >= need && cb) cb(iconList); }

  fetch('/local/asa-data/icons2.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
    iconList = data || []; iconListLoaded = true;
    done();
  }).catch(function(){
    iconList = []; iconListLoaded = true;
    WS.toast('图标列表加载失败', 'error');
    done();
  });

  // Load Chinese name map
  if (!iconZhMapLoaded) {
    fetch('/local/asa-data/icon_zh_map.json?t='+Date.now()).then(function(r){return r.json()}).then(function(data){
      iconZhMap = data || {}; iconZhMapLoaded = true;
    }).catch(function(){
      iconZhMap = {}; iconZhMapLoaded = true;
    }).finally(done);
  } else { done(); }
}

function refreshIconList() {

  if (window._iconRefreshRunning) {

    return;
  }
  window._iconRefreshRunning = true;

  var btn = document.querySelector('button[onclick="refreshIconList()"]');
  var origHTML = btn ? btn.innerHTML : '';
  var origWidth = btn ? btn.style.width : '';

  // 按钮内嵌进度条
  function showProgress(pct, text) {
    if (!btn) return;
    btn.style.position = 'relative';
    btn.style.overflow = 'hidden';
    btn.style.width = origWidth || '220px';
    btn.innerHTML = '<span style="position:relative;z-index:1;font-size:0.85em">' + text + '</span>'
      + '<span style="position:absolute;left:0;top:0;bottom:0;width:' + pct + '%;background:var(--accent);opacity:0.15;transition:width .3s;z-index:0;border-radius:6px"></span>';
  }

    // 轮询进度文件（带停滞检测 + 超时）
    var pollCount = 0;
    var lastDone = -1;
    var stallCount = 0;
    var STALL_MAX = 20;
    var pollTimer = setInterval(function(){
      pollCount++;
      fetch('/local/asa-data/thumbs_progress.json?t=' + Date.now())
        .then(function(r){ return r.json(); })
        .then(function(p){
          if (p.total > 0) {
            var pct = Math.round(p.done * 100 / p.total);
            var txt = pct + '% (' + p.done + '/' + p.total + ')';
            if (p.new) txt += ' +' + p.new + '\u65B0';
            if (p.done === lastDone) {

            } else { lastDone = p.done; stallCount = 0; }

  }, function(){
    window._iconRefreshRunning = false;

  });

  }
  // Check color mode for combo result
  var modeBtn2 = document.getElementById('mcICColorModeBtn'+bi);

    _detectComboBrightness(dataUrl, function(luminance){
      if (luminance >= 0 && pv) {
        applyAutoColorClassWithLum(pv, luminance);

        if (wrapper2 && wrapper2.tagName === 'SPAN') {

          blkIC.images[0].image_native_luminance = luminance;

function saveComboIG(dataUrl, bi, di, overlay){
  var tab = editorData.tabs[editorSelectedTab];
  var block = tab.content_blocks[bi];
  var igRowDi = overlay._igRowDi;
  var container = igRowDi != null ? document.getElementById('mcIGIcons'+bi+'_'+igRowDi) : null;
  // Row-level data persistence: write to editorData, then rebuild DOM via rebuildIGContainer
  var igContainerId2 = container ? container.id : '';
  var diMatch2 = igContainerId2.match(/^mcIGIcons\d+_(\d+)$/);
  var rowDi4, desc;
  if (diMatch2 && block && block.descriptions) {
    rowDi4 = parseInt(diMatch2[1]);
    desc = block.descriptions[rowDi4];
    if (desc && desc.type === 'icon_group' && desc.icons) {
      while (desc.icons.length <= di) desc.icons.push({image_url:'', quantity:0, image_auto_color_mode:'off', image_native_luminance:null});
      desc.icons[di].image_url = dataUrl;
    }
  }
  // Read color mode from button inside overlay
  var modeBtn3 = overlay ? overlay.querySelector('#mcICDescColorModeBtn'+bi+'_'+di) : null;
  var modeVal = modeBtn3 ? modeBtn3.getAttribute('data-mode') || 'off' : 'off';
  if (modeVal === 'normal' || modeVal === 'reverse') {
    var isRev3 = (modeVal === 'reverse');
    _detectComboBrightness(dataUrl, function(luminance){
      if (luminance >= 0) {
        // Persist luminance and mode to editorData
        if (desc && desc.icons && desc.icons[di]) {
          desc.icons[di].image_native_luminance = luminance;
          desc.icons[di].image_auto_color_mode = modeVal;
        }
      }
      // Rebuild DOM from editorData (ensures sync, auto-append slot, brightness visuals)
      if (container && desc && desc.icons) rebuildIGContainer(container, bi, igRowDi, desc.icons);
    });
  } else {
    // off: persist mode directly
    if (desc && desc.icons && desc.icons[di]) {
      desc.icons[di].image_auto_color_mode = 'off';
    }
    // Rebuild DOM immediately for 'off' mode
    if (container && desc && desc.icons) rebuildIGContainer(container, bi, igRowDi, desc.icons);
  }
  comboMode=false;comboSelected=[];overlay.remove();
}

function _detectComboBrightness(dataUrl, callback){
  _pendingBrightnessChecks++;
  _updateSaveBtnState();
  // Pass raw combined image directly to detectImageBrightness (it already excludes transparent pixels)
  detectImageBrightness(dataUrl, function(luminance, errMsg){
    _pendingBrightnessChecks--;
    if (luminance >= 0) {
      _detectToast(true, luminance.toFixed(3));
      if (callback) callback(luminance);
    }
    _updateSaveBtnState();
  });
}

function toggleICMap(bi, val) {
  var el = document.getElementById('mcICHL'+bi);
  var cur = (el.value||'').split(',').filter(function(x){return x;});
  var i = cur.indexOf(val);
  if (i >= 0) cur.splice(i, 1);
  else cur.push(val);
  el.value = cur.join(',');
  var tab = editorData.tabs[editorSelectedTab];
  if (tab && tab.content_blocks[bi]) tab.content_blocks[bi].highlight = el.value;
  // Save expansion state before re-render
  var expanded = [];
  document.querySelectorAll('.block-body').forEach(function(bb,idx){ if(!bb.classList.contains('collapsed')) expanded.push(idx); });
  if (typeof reRender === 'function') reRender();
  // Restore expansion state
  document.querySelectorAll('.block-body').forEach(function(bb,idx){ if(expanded.indexOf(idx)!==-1) bb.classList.remove('collapsed'); });
}

}

function prefillFromRecent(ctx) {

  var _pfAcMode = getCurrentEntryAcMode(ctx);

    if (ctx.mode === 'desc_row') { var _pfd = _pfBlk.descriptions && _pfBlk.descriptions[ctx.di]; _pfLum = (_pfd && _pfd.images && _pfd.images[0]) ? _pfd.images[0].image_native_luminance : null; }
    else if (ctx.mode === 'icon_group') { var _pfd2 = _pfBlk.descriptions && _pfBlk.descriptions[ctx.di]; _pfLum = (_pfd2 && _pfd2.icons && _pfd2.icons[ctx.ii]) ? _pfd2.icons[ctx.ii].image_native_luminance : null; }

function renderPickerThumb(icon, cat, forceInvert) {
  // Composite images from recent: check acMode + native luminance
  if (!forceInvert && icon.url && icon.url.indexOf('data:') === 0 && icon.acMode) {
    if (icon.acMode === 'normal' || icon.acMode === 'reverse') {
      var _lum = icon.lum;
      if (_lum != null && _lum !== 0.5) {
        var _isDark = _lum <= 0.5;
        var _theme = document.documentElement.getAttribute('data-theme') || 'dark';
        if ((_theme === 'dark' && _isDark) || (_theme === 'light' && !_isDark)) forceInvert = true;
      }
    }
  }
  var preset = getAntiColorPreset(icon.url, cat);
  var filterStyle = '';
  var dotHtml = '';
  if (forceInvert) {
    filterStyle = ' style="filter:invert(1)"';
  } else if (preset) {
    var theme = document.documentElement.getAttribute('data-theme') || 'dark';
    var needInvert = (preset === 'dark' && theme === 'dark') || (preset === 'light' && theme === 'light');
    if (needInvert) {
      filterStyle = ' style="filter:invert(1)"';
      var dotCls = preset === 'dark' ? 'ac-dark' : 'ac-light';
      dotHtml = '<span class="ac-dot ' + dotCls + '"></span>';
    }
  }
  return '<div class="icon-thumb-wrap"><img src="' + thumbUrl(icon.url, 96) + '" class="icon-picker-img" loading="lazy" onload="this.classList.add(&quot;loaded&quot;)" onerror="this.hidden=true" data-src="' + icon.url + '"' + filterStyle + '>' + dotHtml + '</div><span>' + (icon.name || icon.url.split('/').pop()) + '</span>';
}
