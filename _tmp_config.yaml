frontend:
    themes: !include_dir_merge_named themes

homeassistant:
    customize: !include customize.yaml
      
shell_command:
    save_r2_config: "python3 /config/save_r2_config.py {{ b64data }}"
    gen_icon_thumbs: "nohup python3 /config/_gen_thumbs_ha.py --resume > /dev/null 2>&1 &"
    command_timeout: 600
    list_r2_icons: "python3 /config/www/asa-data/list_icons.py > /config/www/asa-data/icons2.json"
    save_asa_data: "python3 /config/save_data.py /config/www/asa-data/{{ filename }} '{{ b64data }}'"
    render_asa: "python3 /config/render_asa.py {{ filename }}"
    save_data_chunk: python3 /config/save_chunk.py {{ filename }} '{{ b64data }}'
    save_data_copy: python3 -c "import shutil;shutil.copy('/config/www/asa-data/{{ src }}','/config/www/asa-data/{{ dst }}')"
    build_lovelace: "python3 /config/_run_bl.py"
    sync_lovelace_base: "cp /homeassistant/.storage/lovelace.lovelace /config/lovelace"
    preview_tab: "python3 /config/preview_server.py '{{ tab_name }}' '{{ source }}'"
    load_sb_labels: "python3 /config/load_sb_labels.py"
    save_sb_labels: "python3 /config/save_sb_labels.py"
#关机备选方案  turn_off_yourpc: ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i /config/.ssh/id_rsa white@192.168.199.11 shutdown /s
# DEPRECATED: 2026-07-11 → button.game_logoffpc（Hass.Agent）  log_off_yourpc: ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i /config/.ssh/id_rsa white@192.168.199.11 'query session >session.txt || for /f "skip=2 tokens=3," %i in (session.txt) DO logoff %i || del session.txt'
# DEPRECATED: 2026-07-11 → button.game_lockpc（Hass.Agent）  lock_yourpc: ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i /config/.ssh/id_rsa white@192.168.199.11 'rundll32.exe user32.dll,LockWorkStation'
#副机注销方案，需配置副机SSH及其密钥  log_off_yourpcb: ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i /config/.ssh/id_rsa white@192.168.199.10 'query session >session.txt || for /f "skip=2 tokens=3," %i in (session.txt) DO logoff %i || del session.txt'
#副机锁屏方案，需配置副机SSH及其密钥  lock_yourpcb: ssh -o UserKnownHostsFile=/dev/null -o StrictHostKeyChecking=no -i /config/.ssh/id_rsa white@192.168.199.10 'rundll32.exe user32.dll,LockWorkStation'

group: !include groups.yaml
automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
