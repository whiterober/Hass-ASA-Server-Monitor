template:
  - sensor:
      - name: "123pan_jump_tile"
        state: "123网盘"
        attributes:
          entity_picture: "https://pp.myapp.com/ma_icon/0/icon_54190090_1753492095/256"
      - name: "补丁说明"
        default_entity_id: sensor.patch_description
        icon: mdi:file-document
        state: >
          {{ states('sensor.patch_cache') if states('sensor.patch_cache') != 'unknown' else '暂无补丁说明' }}

      - name: "Patch频道补丁说明"
        default_entity_id: sensor.patch_description_patch
        icon: mdi:file-document
        state: >
          {{ states('sensor.patch_channel_cache') if states('sensor.patch_channel_cache') != 'unknown' else '暂无Patch频道补丁说明' }}

      - name: "新闻频道补丁说明"
        default_entity_id: sensor.news_patch_description
        icon: mdi:file-document
        state: >
          {{ states('sensor.news_cache') if states('sensor.news_cache') != 'unknown' else '暂无新闻频道补丁说明' }}

      - name: "贴吧楼主摘要"
        default_entity_id: sensor.tieba_lz_summary
        icon: mdi:forum
        state: >
          {{ states('sensor.tieba_cache') if states('sensor.tieba_cache') != 'unknown' else '暂无贴吧信息' }}

      - name: "ADM预告摘要"
        default_entity_id: sensor.adm_preview_summary
        icon: mdi:bullhorn
        state: >
          {{ states('sensor.adm_cache') if states('sensor.adm_cache') != 'unknown' else '暂无ADM预告信息' }}

      - name: "ASB摘要"
        default_entity_id: sensor.asb_summary
        icon: mdi:information
        state: >
          {{ states('sensor.asb_cache') if states('sensor.asb_cache') != 'unknown' else '暂无ASB信息' }}

      - name: "贴吧楼主全文"
        default_entity_id: sensor.tieba_lz_full
        icon: mdi:forum
        state: >
          {{ states('sensor.tieba_lz_full') if states('sensor.tieba_lz_full') != 'unknown' else '暂无贴吧全文' }}

      - name: "ADM预告全文"
        default_entity_id: sensor.adm_preview_full
        icon: mdi:bullhorn
        state: "暂无ADM预告信息"

      - name: "ASB全文"
        default_entity_id: sensor.asb_full
        icon: mdi:information
        state: >
          {{ states('sensor.asb_full') if states('sensor.asb_full') != 'unknown' else '暂无ASB全文' }}

      - name: "补丁说明全文"
        default_entity_id: sensor.patch_description_full
        icon: mdi:file-document
        state: "暂无补丁说明"

      - name: "Patch频道补丁信息"
        default_entity_id: sensor.patch_channel_patch_info
        icon: mdi:file-document
        state: "Patch Channel Info"
        attributes:
          content: "暂无Patch频道补丁信息"

      - name: "新闻频道补丁信息"
        default_entity_id: sensor.news_patch_channel_info
        icon: mdi:file-document
        state: "暂无新闻频道补丁信息"
        attributes:
          content: "暂无新闻频道补丁信息"

      - name: "官方服务器版本"
        default_entity_id: sensor.official_server_version
        icon: mdi:tag
        state: >
          {{ state_attr('sensor.asa_server_status', 'official_version') | default('N/A') }}

      - name: "弹窗服务器状态"
        default_entity_id: sensor.dialog_server_status
        icon: >
          {% set server_id = states('input_select.selected_server') %}
          {% set servers = state_attr('sensor.asa_server_details', 'servers') %}
          {% if servers and server_id %}
            {% set matches = servers | selectattr('ProfileName','equalto', server_id) | list %}
            {% set server = matches[0] if matches|length > 0 else None %}
            {% if server and server.Status == 'Running' %}
              mdi:server
            {% else %}
              mdi:server-off
            {% endif %}
          {% else %}
            mdi:help-circle
          {% endif %}
        state: >
          {% set server_id = states('input_select.selected_server') %}
          {% set servers = state_attr('sensor.asa_server_details', 'servers') %}
          {% if servers and server_id %}
            {% set matches = servers | selectattr('ProfileName','equalto', server_id) | list %}
            {% set server = matches[0] if matches|length > 0 else None %}
            {% if server %}
              {% if server.Status == 'Running' %}在线{% else %}离线{% endif %}
            {% else %}未找到
            {% endif %}
          {% else %}请选择服务器
          {% endif %}

      - name: "弹窗服务器版本"
        default_entity_id: sensor.dialog_server_version
        icon: mdi:tag
        state: >
          {% set server_id = states('input_select.selected_server') %}
          {% set servers = state_attr('sensor.asa_server_details', 'servers') %}
          {% if servers and server_id %}
            {% set matches = servers | selectattr('ProfileName','equalto', server_id) | list %}
            {% set server = matches[0] if matches|length > 0 else None %}
            {% if server and server.ServerVersion is defined and server.ServerVersion != 'N/A' %}
              {% set found = server.ServerVersion | regex_findall('(\\d+\\.?\\d*)') %}
              {% set version = found[0] if found | length > 0 else 'N/A' %}
              {{ version }}
            {% else %}N/A
            {% endif %}
          {% else %}请选择服务器
          {% endif %}

      - name: "弹窗服务器玩家数"
        default_entity_id: sensor.dialog_server_players
        icon: mdi:account-group
        state: >
          {% set server_id = states('input_select.selected_server') %}
          {% set server_players = state_attr('sensor.asa_server_details', 'server_players') %}
          {% if server_players and server_id in server_players %}
            {{ server_players[server_id] | length }}
          {% else %}0
          {% endif %}

      - name: "补丁说明版本号"
        default_entity_id: sensor.patch_description_version
        icon: mdi:tag
        state: >
          {% set value = states('sensor.patch_description') %}
          {% set result = value | regex_findall('(?i)(?:v|version|版本)[\\s:：]*([\\d\\.]+)') %}
          {{ result[0] if result else 'N/A' }}

      - name: "Patch频道补丁版本号"
        default_entity_id: sensor.patch_description_patch_version
        icon: mdi:tag
        state: >
          {% set value = states('sensor.patch_description_patch') %}
          {% set result = value | regex_findall('\\d+\\.\\d+\\.\\d+\\.\\d+') %}
          {{ result[0] if result else 'N/A' }}

      - name: "贴吧楼主摘要版本号"
        default_entity_id: sensor.tieba_lz_summary_version
        icon: mdi:tag
        state: >
          {% set value = states('sensor.tieba_lz_summary') %}
          {% set result = value | regex_findall('(?i)(?:v|version|版本)[\\s:：]*([\\d\\.]+)') %}
          {{ result[0] if result else 'N/A' }}

      - name: "ASB版本号"
        default_entity_id: sensor.asb_version
        icon: mdi:tag
        state: >
          {% set value = states('sensor.asb_summary') %}
          {% set result = value | regex_findall('\\b\\d+\\.\\d+\\.\\d+(?:\\.\\d+)?\\b') %}
          {{ result[0] if result else 'N/A' }}

      - name: "最新摘要"
        default_entity_id: sensor.latest_summary_sensor
        icon: mdi:file-document
        state: >
          {% set entities = [
            states.sensor.patch_cache,
            states.sensor.patch_channel_cache,
            states.sensor.news_cache,
            states.sensor.tieba_cache,
            states.sensor.adm_cache,
            states.sensor.asb_cache
          ] %}
          {% set latest = entities
            | selectattr('attributes.created_at', 'defined')
            | sort(attribute='attributes.created_at', reverse=True)
            | list
            | first %}
          {{ latest.state if latest is not none and latest.state not in ['unknown', 'unavailable', ''] else '暂无摘要' }}

      - name: "当前服务器端口"
        default_entity_id: sensor.profile_port
        icon: mdi:lan
        state: "{{ states('sensor.profile_port') }}"

      - name: "当前地图安全点坐标"
        default_entity_id: sensor.safe_point_coords
        icon: mdi:map-marker
        state: "{{ state_attr('sensor.safe_point_coords', 'coords') | default('') }}"
        attributes:
          coords: ""

      - name: "弹窗服务器游戏内时间"
        default_entity_id: sensor.dialog_server_ingame_time
        icon: mdi:clock
        state: >
          {% set server_id = states('input_select.selected_server') %}
          {% set times = state_attr('sensor.ingame_time_cache', 'server_times') %}
          {% if times and server_id in times %}
            {{ times[server_id] }}
          {% else %}
            N/A
          {% endif %}

      - name: "服务器状态与版本"
        default_entity_id: sensor.dialog_server_combined
        icon: >
          {% if is_state('sensor.dialog_server_status', '在线') %}
            mdi:server
          {% else %}
            mdi:server-off
          {% endif %}
        state: >
          {% if is_state('sensor.dialog_server_status', '在线') %}
            {{ states('sensor.dialog_server_version') }}
          {% else %}
            离线 ({{ states('sensor.dialog_server_version') }})
          {% endif %}
        attributes:
          status: "{{ states('sensor.dialog_server_status') }}"
          version: "{{ states('sensor.dialog_server_version') }}"
  - switch:
      - name: "客厅制冷"
        state: "{{ not is_state('climate.aux_ac', 'off') }}"
        turn_on:
          service: climate.set_hvac_mode
          data:
            entity_id: climate.aux_ac
            hvac_mode: 'cool'
        turn_off:
          service: climate.set_hvac_mode
          data:
            entity_id: climate.aux_ac
            hvac_mode: 'off'
  - switch:
      - name: "工作室制冷"
        state: >
          {{ not (
            is_state('climate.lumi_mcn04_c490_air_conditioner_2', 'off') and
            is_state('climate.lumi_mcn02_e4a7_air_conditioner_2', 'off')
          ) }}
        turn_on:
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn04_c490_air_conditioner_2
              hvac_mode: 'cool'
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn02_e4a7_air_conditioner_2
              hvac_mode: 'cool'
        turn_off:
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn04_c490_air_conditioner_2
              hvac_mode: 'off'
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn02_e4a7_air_conditioner_2
              hvac_mode: 'off'
  - switch:
      - name: "客厅制热"
        state: "{{ not is_state('climate.aux_ac', 'off') }}"
        turn_on:
          service: climate.set_hvac_mode
          data:
            entity_id: climate.aux_ac
            hvac_mode: 'heat'
        turn_off:
          service: climate.set_hvac_mode
          data:
            entity_id: climate.aux_ac
            hvac_mode: 'off'
  - switch:
      - name: "工作室制热"
        state: >
          {{ not (
            is_state('climate.lumi_mcn04_c490_air_conditioner_2', 'off') and
            is_state('climate.lumi_mcn02_e4a7_air_conditioner_2', 'off')
          ) }}
        turn_on:
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn04_c490_air_conditioner_2
              hvac_mode: 'heat'
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn02_e4a7_air_conditioner_2
              hvac_mode: 'heat'
        turn_off:
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn04_c490_air_conditioner_2
              hvac_mode: 'off'
          - service: climate.set_hvac_mode
            data:
              entity_id: climate.lumi_mcn02_e4a7_air_conditioner_2
              hvac_mode: 'off'
  - switch:
      - name: "GAME主机集成"
        unique_id: game_console_switch
        state: "{{ is_state('switch.pc', 'on') }}"
        turn_on:
          - service: switch.turn_on
            target:
              entity_id: switch.pc
          - delay: "00:00:01"  # 可选延迟，确保 电视 启动
          - service: media_player.turn_on
            target:
              entity_id: media_player.sony_bravia_tv
          - delay: "00:00:02"  # 可选延迟，确保 PC 启动
          - service: media_player.select_source
            target:
              entity_id: media_player.sony_bravia_tv
            data:
              source: "HDMI 4"
          - delay: "00:00:03"  # 可选延迟，确保输入切换完成
          - service: media_player.media_play_pause
            target:
              entity_id: media_player.sony_bravia_tv
        turn_off:
          - service: switch.turn_off
            target:
              entity_id: switch.pc

  - sensor:
      - name: "ASA 服务器规则 HTML"
        unique_id: asa_server_rules_html
        state: "OK"
        icon: mdi:gavel
        attributes:
          rendered_rules: !include www/asa-data/server_rules.yaml
      - name: "ASA 部落运维速查 HTML"
        unique_id: asa_tribe_ops_html
        state: "OK"
        icon: mdi:table-cog
        attributes:
          rendered_tribe_ops: !include www/asa-data/tribe_ops.yaml
      - name: "ASA 部落基地速查 HTML"
        unique_id: asa_base_quick_ref_html
        state: "OK"
        icon: mdi:home-map-marker
        attributes:
          rendered_base: !include www/asa-data/base_quick_ref.yaml

input_boolean:
  rcon_commands_expanded:
    name: "RCON命令展开状态"
    initial: false
    icon: mdi:chevron-down

input_button:
  refresh_server_status:
    name: "刷新服务器状态"
    icon: mdi:refresh
  execute_server_action:
    name: "执行服务器操作"
    icon: mdi:play
  quan_tu_cun_dang_hou_zhong_zhi:
    name: "全图存档后终止"
    icon: mdi:stop-circle-outline
  quan_tu_qing_li_kong_long:
    name: "全图清理恐龙"
    icon: mdi:delete-variant
  execute_player_action:
    name: "执行玩家操作"
    icon: mdi:account-cog

