'1615614179858':
  alias: 关闭主电脑
  sequence:
  - service: hassio.addon_stdin
    data:
      addon: core_rpc_shutdown
      input: GAME
  mode: single
'1620634601365':
  alias: 注销主机
  sequence:
  - event: ''
    event_data: {}
  mode: restart
'1650176234822':
  alias: 关闭剪辑电脑
  sequence:
  - service: hassio.addon_stdin
    data:
      addon: core_rpc_shutdown
      input: TOOL
  mode: single
'1650176265771':
  alias: 注销剪辑主机
  sequence:
  - event: ''
    event_data: {}
  mode: restart
'1677578002000':
  alias: 启动剪辑电脑
  sequence:
  - service: switch.turn_on
    data: {}
    target:
      entity_id: switch.pcb
  mode: single
execute_server_action:
  alias: 执行服务器操作
  sequence:
  - service: input_button.press
    entity_id: input_button.execute_server_action
execute_server_action_with_selection:
  alias: 执行服务器操作（带选择）
  sequence:
  - service: input_select.select_option
    data:
      entity_id: input_select.selected_action
      option: '{{ action }}'
  - delay: 00:00:01
  - service: input_button.press
    entity_id: input_button.execute_server_action
set_selected_server:
  alias: 设置选中服务器
  sequence:
  - service: input_select.select_option
    data:
      entity_id: input_select.selected_server
      option: '{{ server_id }}'
  - service: input_text.set_value
    data:
      entity_id: input_text.current_operator
      value: "{% set uid = context.user_id %} {% set ns = namespace(name=uid[:8]~'…')\
        \ %} {% for p in states.person %}\n  {% if p.attributes.user_id == uid %}\n\
        \    {% set ns.name = p.attributes.friendly_name %}\n  {% endif %}\n{% endfor\
        \ %} {% set themes = state_attr('sensor.asa_server_themes', 'server_themes')\
        \ or {} %} {% set server = themes.get(server_id, {}) %} {{ ns.name }} 已操作\
        \ {{ server.get('name', server_id) }}"
  fields:
    server_id:
      description: 服务器ID
      example: Isl
set_rcon_command:
  alias: 设置RCON命令
  sequence:
  - service: var.set
    data:
      entity_id: var.rcon_message
      value: '{{ command }}'
  fields:
    command:
      description: RCON命令
      example: broadcast 服务器即将重启
set_dialog_server_name:
  alias: 设置对话框服务器名称
  sequence:
  - service: input_select.select_option
    data:
      entity_id: input_select.dialog_server_name
      option: '{{ name }}'
  fields:
    name:
      description: 服务器名称
      example: 孤岛
kick_player:
  alias: 踢出在线玩家（由界面触发）
  sequence:
  - service: input_select.select_option
    data:
      entity_id: input_select.selected_server
      option: '{{ profile }}'
  - service: var.set
    data:
      entity_id: var.rcon_message
      value: '{% set p = player | string %} {% if p.isdigit() %} KickPlayer {{ p }}
        {% else %} KickPlayer "{{ p }}" {% endif %}

        '
  - service: input_select.select_option
    data:
      entity_id: input_select.selected_action
      option: rcon
  - delay: 00:00:01
  - service: input_button.press
    data:
      entity_id: input_button.execute_server_action
  fields:
    player:
      description: 玩家名称或ID
      example: someplayer 或 76561197960287930
    profile:
      description: 服务器ID（ProfileName）
      example: Isl
  mode: single
fill_rcon_for_player:
  alias: 填充RCON命令（仅填充，不执行）
  sequence:
  - service: input_select.select_option
    data:
      entity_id: input_select.selected_server
      option: '{{ profile }}'
  - service: var.set
    data:
      entity_id: var.rcon_message
      value: '{% set p = player | string %} {% if p.isdigit() %} KickPlayer {{ p }}
        {% else %} KickPlayer "{{ p }}" {% endif %}

        '
  fields:
    player:
      description: 玩家名称或ID
      example: someplayer 或 76561197960287930
    profile:
      description: 服务器ID（ProfileName）
      example: Isl
  mode: single
set_player_action_message:
  alias: 设置玩家操作消息
  sequence:
  - service: var.set
    data:
      entity_id: var.player_action_message
      value: '{{ message }}'
  fields:
    message:
      description: 操作消息内容
      example: 请遵守服务器规则
execute_player_action_with_message:
  alias: 执行玩家操作（带消息）
  sequence:
  - service: input_select.select_option
    data:
      entity_id: input_select.player_action_type
      option: '{{ action_type }}'
  - service: var.set
    data:
      entity_id: var.player_action_message
      value: '{{ message }}'
  - delay: 00:00:01
  - service: input_button.press
    entity_id: input_button.execute_player_action
  fields:
    action_type:
      description: 操作类型
      example: 发送私信
    message:
      description: 操作消息
      example: 请遵守服务器规则
set_rcon_command_safe_point:
  alias: 传送到安全点
  sequence:
  - service: script.set_rcon_command
    data:
      command: 'SetPlayerPos 点击在线玩家昵称替换此处 {{ states(''sensor.safe_point_coords'')
        }}

        '
      command_name: 传安全点
test_localstorage_write:
  alias: 测试LocalStorage写入
  sequence:
  - service: browser_mod.console
    data:
      command: window.localStorage.setItem("test_srv", "from_server")
